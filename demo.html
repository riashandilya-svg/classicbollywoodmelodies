<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>riaaz · Interactive Demo</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,600;1,700&family=DM+Sans:ital,wght@0,200;0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #fdf8ff;
      --surface: rgba(255,255,255,0.94);
      --text: #160d22;
      --muted: rgba(22,13,34,0.52);
      --border: rgba(155,110,255,0.22);
      --btnText: #2b1140;
      --violet: 155,110,255;
      --violetDeep: 85,55,190;
      --pink: 255,90,160;
      --rose: 255,60,120;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      color: var(--text);
      background: var(--bg);
      overflow: hidden;
    }

    #aurora { position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: 0.38; }

    body::before {
      content: ''; position: fixed; inset: 0; z-index: 1; pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
      opacity: 0.45;
    }

    #appFrame {
      position: fixed; inset: 0;
      width: 100vw; height: 100vh;
      border: 0; display: block; z-index: 2;
    }

    /* ── TOP NAV ── */
    #demoTopBar {
      position: fixed; top: 0; left: 0; right: 0;
      z-index: 1000002; height: 58px;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 1.8rem;
      background: rgba(253,248,255,0.82);
      backdrop-filter: blur(20px) saturate(180%);
      border-bottom: 1px solid rgba(155,110,255,0.13);
      box-shadow: 0 2px 24px rgba(22,10,35,0.07);
    }

    .nav-brand {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.5rem; font-weight: 700; letter-spacing: -0.03em;
      background: linear-gradient(135deg,
        rgba(var(--violetDeep),1) 0%,
        rgba(var(--violet),1) 40%,
        rgba(var(--pink),1) 80%);
      -webkit-background-clip: text; background-clip: text; color: transparent;
      text-decoration: none; line-height: 1;
    }

    .nav-pill {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.63rem; font-weight: 500; letter-spacing: 0.16em; text-transform: uppercase;
      color: rgba(var(--violetDeep), 0.8);
      padding: 3px 10px; border-radius: 100px;
      background: rgba(155,110,255,0.08); border: 1px solid rgba(155,110,255,0.2);
    }

    .nav-right { display: flex; align-items: center; gap: 0.55rem; }

    .nbtn {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 7px 16px; border-radius: 100px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.78rem; font-weight: 500; letter-spacing: 0.01em;
      cursor: pointer; border: 0; text-decoration: none;
      transition: all 0.2s; white-space: nowrap;
    }
    .nbtn-ghost {
      color: var(--muted);
      border: 1px solid rgba(22,13,34,0.13) !important;
      background: rgba(255,255,255,0.6);
    }
    .nbtn-ghost:hover { background: rgba(255,255,255,0.95); color: var(--text); transform: translateY(-1px); }
    .nbtn-primary {
      color: var(--btnText);
      border: 1px solid rgba(155,110,255,0.32) !important;
      background: linear-gradient(135deg, rgba(255,90,160,0.24), rgba(155,110,255,0.18));
      box-shadow: 0 4px 16px rgba(155,110,255,0.14), inset 0 1px 0 rgba(255,255,255,0.7);
    }
    .nbtn-primary:hover { transform: translateY(-1px); box-shadow: 0 8px 28px rgba(155,110,255,0.22), inset 0 1px 0 rgba(255,255,255,0.7); }
    .nbtn-red { color: #fff; background: #dd0000; border: 1px solid rgba(200,0,0,0.35) !important; box-shadow: 0 4px 14px rgba(200,0,0,0.18); }
    .nbtn-red:hover { background: #bb0000; transform: translateY(-1px); }

    /* ── OVERLAY ── */
    #demoOverlay {
      position: fixed; inset: 0;
      background: rgba(10,5,20,0.52);
      display: none; z-index: 999999; pointer-events: none;
    }

    /* ── HIGHLIGHT ── */
    #demoHighlight {
      position: fixed;
      border: 2px solid rgba(var(--violet), 0.88);
      border-radius: 14px;
      box-shadow:
        0 0 0 5px rgba(155,110,255,0.16),
        0 0 0 10px rgba(155,110,255,0.07),
        0 16px 48px rgba(22,10,35,0.28);
      pointer-events: none; display: none; z-index: 1000000;
    }

    /* ── CARD ── */
    #demoCard {
      position: fixed;
      width: min(680px, calc(100vw - 28px));
      background: rgba(253,248,255,0.97);
      border: 1px solid rgba(155,110,255,0.2);
      border-radius: 24px;
      padding: 22px 22px 16px;
      color: var(--text);
      box-shadow: 0 28px 80px rgba(22,10,35,0.14), inset 0 1px 0 rgba(255,255,255,0.95);
      backdrop-filter: blur(24px) saturate(160%);
      z-index: 1000001; display: none;
      overflow: hidden;
    }
    #demoCard::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg,
        rgba(var(--pink),0.7), rgba(var(--violet),0.85), rgba(var(--pink),0.4));
    }

    /* Progress bar strip */
    #demoProgressBar {
      position: absolute; top: 2px; left: 0; height: 2px;
      background: linear-gradient(90deg, rgba(var(--pink),0.9), rgba(var(--violet),0.9));
      transition: width 0.4s cubic-bezier(.4,0,.2,1);
      border-radius: 0 2px 2px 0;
    }

    /* Step badge */
    #demoStepBadge {
      display: inline-flex; align-items: center; gap: 5px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.65rem; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase;
      color: rgba(var(--violetDeep),0.7);
      padding: 3px 10px; border-radius: 100px;
      background: rgba(155,110,255,0.07); border: 1px solid rgba(155,110,255,0.18);
      margin-bottom: 10px;
    }

    #demoTitle {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.28rem; font-weight: 600; line-height: 1.2;
      letter-spacing: -0.015em; margin: 0 0 9px 0;
      background: linear-gradient(135deg,
        rgba(var(--violetDeep),1) 0%,
        rgba(var(--violet),1)    50%,
        rgba(var(--pink),0.9)    100%);
      -webkit-background-clip: text; background-clip: text; color: transparent;
    }

    #demoText {
      font-size: 0.875rem; line-height: 1.65;
      color: rgba(22,13,34,0.70); font-weight: 300;
      margin: 0 0 8px 0;
    }
    #demoText p { margin-bottom: 7px; }
    #demoText p:last-child { margin-bottom: 0; }
    #demoText ul { margin: 7px 0 0 18px; padding: 0; }
    #demoText li { margin: 5px 0; font-size: 0.855rem; color: rgba(22,13,34,0.62); }
    #demoText b, #demoText strong { font-weight: 600; color: var(--text); }

    #demoActionStatus {
      font-size: 0.775rem; font-weight: 500;
      font-family: 'DM Sans', sans-serif;
      margin: 4px 0 6px; min-height: 16px;
      opacity: 0; transition: opacity 0.2s;
    }

    #demoVideo {
      width: 100%; max-width: 480px; max-height: 230px;
      border-radius: 14px; background: #0d0010; display: none;
      margin: 10px auto 12px; overflow: hidden;
      border: 1px solid rgba(155,110,255,0.13);
    }
    #demoVideo video { width: 100%; height: auto; max-height: 230px; object-fit: contain; display: block; }

    #demoImage { display: none; margin: 10px 0 12px; }
    #demoImage img { width: 100%; border-radius: 12px; border: 1px solid var(--border); }

    /* Controls row */
    #demoControls {
      display: flex; gap: 7px; align-items: center;
      justify-content: space-between; margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid rgba(155,110,255,0.1);
    }

    .cbtn {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 8px 16px; border-radius: 100px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8rem; font-weight: 500; letter-spacing: 0.01em;
      cursor: pointer; border: 0;
      transition: all 0.18s; white-space: nowrap;
    }
    .cbtn-ghost {
      color: var(--muted);
      border: 1px solid rgba(22,13,34,0.13) !important;
      background: rgba(255,255,255,0.7);
    }
    .cbtn-ghost:hover { background: #fff; color: var(--text); }
    .cbtn-ghost:disabled { opacity: 0.3; cursor: not-allowed; pointer-events: none; }

    .cbtn-dark {
      color: rgba(253,248,255,0.9); background: rgba(22,13,34,0.88);
      border: 1px solid rgba(22,13,34,0.5) !important;
    }
    .cbtn-dark:hover { background: rgba(42,21,69,0.95); }

    .cbtn-primary {
      color: var(--btnText);
      background: linear-gradient(135deg, rgba(255,90,160,0.28), rgba(155,110,255,0.22));
      border: 1px solid rgba(155,110,255,0.35) !important;
      box-shadow: 0 4px 14px rgba(155,110,255,0.16), inset 0 1px 0 rgba(255,255,255,0.6);
    }
    .cbtn-primary:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(155,110,255,0.24); }
    .cbtn-primary:disabled { opacity: 0.38; cursor: not-allowed; transform: none; pointer-events: none; }

    /* Measures link */
    .measures-link {
      display: none;
      padding: 8px 14px; border-radius: 100px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.77rem; font-weight: 500;
      color: var(--btnText); text-decoration: none;
      background: linear-gradient(135deg, rgba(155,110,255,0.14), rgba(255,90,160,0.1));
      border: 1px solid rgba(155,110,255,0.28) !important;
      transition: all 0.2s; white-space: nowrap;
    }
    .measures-link:hover {
      background: linear-gradient(135deg, rgba(155,110,255,0.24), rgba(255,90,160,0.18));
      transform: translateY(-1px);
    }

    /* Step counter */
    #demoStep {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.9rem; font-style: italic;
      color: var(--muted); flex-shrink: 0;
    }

    /* Mobile */
    @media (max-width: 480px) {
      #demoTopBar { padding: 0 1rem; height: 52px; }
      .nav-brand { font-size: 1.25rem; }
      .nav-pill { display: none; }
      .nbtn { padding: 6px 11px; font-size: 0.72rem; }
      #demoCard { padding: 18px 16px 14px; border-radius: 18px; }
      #demoTitle { font-size: 1.1rem; }
      #demoText { font-size: 0.84rem; }
    }
  </style>
</head>
<body>

<canvas id="aurora" aria-hidden="true"></canvas>
<iframe id="appFrame" title="riaaz App"></iframe>

<!-- NAV BAR -->
<div id="demoTopBar">
  <div style="display:flex;align-items:center;gap:0.75rem;">
    <span class="nav-brand">riaaz</span>
    <span class="nav-pill">✦ Interactive Demo</span>
  </div>
  <div class="nav-right">
    <a class="nbtn nbtn-red" href="https://www.youtube.com/watch?v=F5oWi0UIy1U" target="_blank" rel="noopener">▶ Demo Video</a>
    <button class="nbtn nbtn-primary" id="startTourBtn">Start Demo</button>
    <button class="nbtn nbtn-ghost" id="loginBtn" type="button">Login</button>
    <button class="nbtn nbtn-ghost" id="stopTourBtn" style="display:none;">✕ Exit</button>
  </div>
</div>

<div id="demoOverlay"></div>
<div id="demoHighlight"></div>

<!-- TOUR CARD -->
<div id="demoCard">
  <div id="demoProgressBar"></div>
  <div id="demoStepBadge">Step <span id="demoStepNum">1</span> of <span id="demoStepTotal">20</span></div>
  <h3 id="demoTitle"></h3>
  <div id="demoText"></div>
  <div id="demoActionStatus"></div>
  <div id="demoImage"><img id="demoImageEl" alt="" /></div>
  <div id="demoVideo"><video id="demoVideoEl" controls playsinline></video></div>
  <div id="demoControls">
    <button class="cbtn cbtn-ghost" id="backBtn">← Back</button>
    <span id="demoStep"></span>
    <div style="display:flex;gap:7px;align-items:center;flex-wrap:wrap;justify-content:flex-end;">
      <a class="measures-link" id="measuresLink" href="https://www.youtube.com/watch?v=FaJh5yr51iw" target="_blank" rel="noopener">🎵 What are measures?</a>
      <button class="cbtn cbtn-dark" id="skipBtn">Skip</button>
      <button class="cbtn cbtn-primary" id="nextBtn">Next →</button>
    </div>
  </div>
</div>

<script>
const APP_URL = "https://riashandilya-svg.github.io/classicbollywoodmelodies/demo-app.html";

/* ─────────────────────────────────────────────
   KEYBOARD STYLE INJECTION
   Injects Level-2-quality visual design into
   the iframe keyboard — shape, shadow, radius,
   depth — without touching any color values.
───────────────────────────────────────────── */
const KEYBOARD_STYLES = `
/* ── Keyboard wrap ── */
.keyboard {
  position: relative;
  display: flex;
  height: 130px;
  user-select: none;
  padding: 0 2px;
  background: transparent;
}

/* ── White keys ── */
.key-white {
  width: 38px;
  height: 130px;
  flex-shrink: 0;
  border-radius: 0 0 7px 7px;
  cursor: pointer;
  position: relative;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  padding-bottom: 6px;
  font-size: 0.48rem;
  font-family: 'DM Sans', system-ui, sans-serif;
  font-weight: 500;
  letter-spacing: 0.02em;
  transition: background 0.07s, transform 0.05s;
  z-index: 1;

  /* Layered shadows for depth — no colour override */
  box-shadow:
    inset 0 -3px 0 rgba(0,0,0,0.10),
    inset 0 1px 0 rgba(255,255,255,0.90),
    0 2px 8px rgba(0,0,0,0.06),
    0 1px 2px rgba(0,0,0,0.08);

  border-left:   1px solid rgba(0,0,0,0.09);
  border-right:  1px solid rgba(0,0,0,0.09);
  border-bottom: 1px solid rgba(0,0,0,0.14);
  border-top:    none;
}

/* Slight press sink */
.key-white:active,
.key-white.pressed {
  transform: translateY(1px);
  box-shadow:
    inset 0 -1px 0 rgba(0,0,0,0.10),
    inset 0 2px 4px rgba(0,0,0,0.08),
    0 1px 3px rgba(0,0,0,0.06);
}

/* ── Black keys ── */
.key-black {
  width: 24px;
  height: 80px;
  border-radius: 0 0 6px 6px;
  cursor: pointer;
  position: absolute;
  z-index: 2;
  top: 0;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  padding-bottom: 5px;
  font-size: 0.42rem;
  font-family: 'DM Sans', system-ui, sans-serif;
  font-weight: 500;
  letter-spacing: 0.02em;
  transition: background 0.07s, transform 0.05s;

  /* Rich physical-key shadow — no colour override */
  box-shadow:
    2px 5px 10px rgba(0,0,0,0.36),
    1px 3px 5px  rgba(0,0,0,0.24),
    inset 0 1px 0 rgba(255,255,255,0.10),
    inset 0 -2px 0 rgba(0,0,0,0.30);
}

/* Slight press sink */
.key-black:active,
.key-black.pressed {
  transform: translateY(2px);
  box-shadow:
    1px 2px 5px  rgba(0,0,0,0.32),
    inset 0 2px 4px rgba(0,0,0,0.28);
}

/* ── Note label spans inside keys ── */
.key-white > span,
.key-white > .key-label {
  font-family: 'DM Sans', system-ui, sans-serif;
  font-size: 0.46rem;
  font-weight: 500;
  letter-spacing: 0.04em;
  opacity: 0.45;
  pointer-events: none;
  user-select: none;
  line-height: 1;
}

.key-black > span,
.key-black > .key-label {
  font-family: 'DM Sans', system-ui, sans-serif;
  font-size: 0.4rem;
  font-weight: 500;
  letter-spacing: 0.02em;
  opacity: 0.30;
  pointer-events: none;
  user-select: none;
  line-height: 1;
}

/* ── Scrollable piano wrapper ── */
.piano-wrap,
[class*="keyboard-wrap"],
[class*="piano-container"],
[class*="keys-wrap"] {
  overflow-x: auto;
  overflow-y: visible;
  padding-bottom: 8px;
  /* Elegant fade-out at scroll edges */
  -webkit-mask-image: linear-gradient(
    to right,
    transparent 0,
    black 28px,
    black calc(100% - 28px),
    transparent 100%
  );
  mask-image: linear-gradient(
    to right,
    transparent 0,
    black 28px,
    black calc(100% - 28px),
    transparent 100%
  );
}

/* ── Thin scrollbar so the fade looks clean ── */
.piano-wrap::-webkit-scrollbar,
[class*="keyboard-wrap"]::-webkit-scrollbar { height: 3px; }
.piano-wrap::-webkit-scrollbar-track,
[class*="keyboard-wrap"]::-webkit-scrollbar-track { background: transparent; }
.piano-wrap::-webkit-scrollbar-thumb,
[class*="keyboard-wrap"]::-webkit-scrollbar-thumb {
  background: rgba(155,110,255,0.22);
  border-radius: 2px;
}
`;

/* ─────────────────────────────────────────────
   Inject styles once the iframe has loaded.
   Works for same-origin iframes; for cross-origin
   deployments, paste the KEYBOARD_STYLES string
   directly into your demo-app.html <style> block.
───────────────────────────────────────────── */
function injectKeyboardStyles(iframeDoc) {
  if (!iframeDoc) return;
  /* Remove any previous injection to avoid doubling */
  const prev = iframeDoc.getElementById('__riaaz_kb_styles__');
  if (prev) prev.remove();

  const tag = iframeDoc.createElement('style');
  tag.id = '__riaaz_kb_styles__';
  tag.textContent = KEYBOARD_STYLES;
  (iframeDoc.head || iframeDoc.documentElement).appendChild(tag);
}

const STEPS = [
  {
    title: "Connect your keyboard (USB) — Optional but highly recommended",
    html: `<p>You may use your device's touch screen or mouse to learn, but for the best experience, connect a piano/MIDI keyboard using a USB cable (usually USB-B on the keyboard side).</p><p>If you see the MIDI permission popup, select <b>"Continue allowing…"</b> and click <b>Done</b>.</p><p><b>If it doesn't show up:</b></p><ul><li>Click the lock icon near the address bar</li><li>Open <b>Site settings / Permissions</b></li><li>Find <b>MIDI devices</b> and set it to <b>Allow</b></li><li>Refresh the page and try again</li></ul>`,

  },
  {
    title: "Pick your start measure",
    text: "Type the start measure from your sheet music here (for example: 1). Then click Next when you're ready.",
    showMeasuresLink: true, selector: "#startMeasureInput", dim: false,
    action: { type: "input", selector: "#startMeasureInput", prompt: "Try typing a start measure (example: 1).", doneText: "Done ✅  Start measure set." }
  },
  {
    title: "Pick your end measure",
    text: "Now type the end measure from your sheet music here (for example: 2). Then click Next when you're ready.",
    showMeasuresLink: true, selector: "#endMeasureInput", dim: false,
    action: { type: "input", selector: "#endMeasureInput", prompt: "Try typing an end measure (example: 2).", doneText: "Done ✅  End measure set." }
  },
  {
    title: "Start practice",
    text: "Click Start Practice. The app will first play the selected measures, then wait for your input.",
    selector: "#startPracticeButton", dim: false, waitForClick: true,
    action: { type: "click", selector: "#startPracticeButton", prompt: "Click Start Practice to begin.", doneText: "Practice started ▶", hideCardAfterClick: true },
    resume: { title: "Well done 🎉", text: "Nice work. Now let's look at the next feature. Click Next when you're ready." }
  },
  {
    title: "Understanding mistakes",
    text: "As you play, messages will appear here telling you whether each note was played correctly. If something isn't right, you'll also see an explanation of why.\n\nIf you'd like to try this yourself, click Back, choose a short section, and start practice again. Otherwise, click Next to continue.",
    selector: "#feedback", dim: false
  },
  { title: "Stop", text: "Click Stop anytime to stop playback or training. It's useful if you want to pause, fix a setting, or take a break.", selector: "#stopButton", dim: false },
  {
    title: "Reset",
    text: "Reset puts everything back to the default state — hand, measures, speed, toggles. Use this if you want a clean start.",
    selector: "#resetButton", dim: false,
    action: { type: "click", selector: "#resetButton", prompt: "Optional: click Reset to return everything to default.", doneText: "Done ✅  Reset." }
  },
  {
    title: "Hide note names",
    text: "Use this to hide or show the note names on the keyboard. It's great when you want to test yourself without hints.",
    selector: "#toggleNamesButton", dim: false,
    action: { type: "click", selector: "#toggleNamesButton", prompt: "Optional: click it once to hide/show note names.", doneText: "Done ✅  Toggled note names." }
  },
  { title: "Beat", text: "Turn Beat on to hear a steady metronome pulse while you play.", selector: "#beatToggle", dim: false },
  { title: "Counting", text: "Counting speaks the count out loud to help you stay in time.", selector: "#countToggle", dim: false },
  { title: "1 & 2 &", text: "This adds the 'and' subdivisions, which is useful for faster rhythms and tighter timing.", selector: "#subdivisionToggle", dim: false },
  { title: "Language", text: "Switch the counting language here.", selector: "#languageToggle", dim: false },
  { title: "Skip repeats in sheet", text: "If your sheet music has a repeat section, you can toggle this on or off. When it's on, repeats are skipped. When it's off, repeats will play normally.", selector: "#skipRepeatsCheckbox", dim: false },
  { title: "Loop section", text: "Turn this on to keep repeating your selected measures. After it reaches the end measure, it automatically jumps back to the start measure and continues until you press Stop.", selector: "#loopCheckbox", dim: false },
  {
    title: "Play full song",
    text: "Use this to play the full song with visuals. It's helpful to listen first before practising a section.",
    selector: "#playSongButton", dim: false,
    action: { type: "click", selector: "#playSongButton", prompt: "Optional: click Play Full Song to try it.", doneText: "Done ✅  Full song started." }
  },
  {
    title: "Speed",
    text: "You can slow things down or speed them up anytime. Try tapping + or − once. If you want to feel the difference more clearly, click Back, play the full song, then change the speed while it plays. Click Next when you're ready.",
    selector: "#speedDisplay", dim: false,
    action: { type: "observeTextChange", selector: "#speedDisplay", prompt: "Try clicking + or − to change the speed.", doneText: "Done ✅  Speed changed." }
  },
  { title: "Instant note feedback", text: "On the right, you'll see what you played under 'You pressed'. Under 'Correct note', you'll see the note you're supposed to play.", selector: "#sideNoteFeedback", dim: false },
  {
    title: "Free Mode",
    text: "Free Mode lets you play freely — with your MIDI keyboard or by clicking notes with your mouse.",
    selector: "#freeModeButton", dim: false,
    action: { type: "click", selector: "#freeModeButton", prompt: "Optional: click Free Mode to try it.", doneText: "Done ✅  Free Mode toggled." }
  },
  {
    title: "Demo complete 🎉",
    text: "You've reached the end of the demo.\n\nThis was a trial version of the song, designed to show you how practice, feedback, and playback work.\n\nTo unlock the full song, please log in first.",
    selector: null, dim: true, nextLabel: "Login →",
    nextUrl: "https://riashandilya-svg.github.io/classicbollywoodmelodies/login.html"
  }
];

/* DOM refs */
const frame      = document.getElementById("appFrame");
const overlay    = document.getElementById("demoOverlay");
const hi         = document.getElementById("demoHighlight");
const card       = document.getElementById("demoCard");
const titleEl    = document.getElementById("demoTitle");
const textEl     = document.getElementById("demoText");
const stepEl     = document.getElementById("demoStep");
const stepNumEl  = document.getElementById("demoStepNum");
const stepTotEl  = document.getElementById("demoStepTotal");
const statusEl   = document.getElementById("demoActionStatus");
const progressBar= document.getElementById("demoProgressBar");
const videoWrap  = document.getElementById("demoVideo");
const videoEl    = document.getElementById("demoVideoEl");
const imageWrap  = document.getElementById("demoImage");
const imageEl    = document.getElementById("demoImageEl");
const startBtn   = document.getElementById("startTourBtn");
const stopBtn    = document.getElementById("stopTourBtn");
const nextBtn    = document.getElementById("nextBtn");
const backBtn    = document.getElementById("backBtn");
const skipBtn    = document.getElementById("skipBtn");
const loginBtn   = document.getElementById("loginBtn");

stepTotEl.textContent = STEPS.length;

loginBtn.addEventListener("click", () => {
  window.location.href = "https://riashandilya-svg.github.io/classicbollywoodmelodies/login.html";
});

let idx = 0, running = false, currentHighlightedElement = null;
let waitCleanup = null, waitSatisfied = false;
let actionCleanup = null, actionDone = false;

frame.src = APP_URL;

function stopImage() { imageEl.removeAttribute("src"); imageWrap.style.display = "none"; }
function showImage(src, alt) {
  if (!src) { stopImage(); return; }
  imageEl.src = src; imageEl.alt = alt || ""; imageWrap.style.display = "block";
}
function stopVideo() {
  videoEl.pause(); videoEl.removeAttribute("src"); videoEl.load();
  videoWrap.style.display = "none";
}
function playVideo(src) {
  if (!src) { stopVideo(); return; }
  videoEl.src = src; videoWrap.style.display = "block";
  videoEl.currentTime = 0; videoEl.play().catch(() => {});
}
function setStatus(msg, done = false) {
  statusEl.textContent = msg || "";
  statusEl.style.color = done ? "rgba(15,150,90,0.9)" : "rgba(22,13,34,0.62)";
  statusEl.style.opacity = msg ? "1" : "0";
}
function setNextEnabled(enabled) { nextBtn.disabled = !enabled; }
function setOverlayDim(dim) {
  overlay.style.display = "block";
  overlay.style.background = dim ? "rgba(10,5,20,0.52)" : "transparent";
}

function showTour() {
  running = true; setOverlayDim(true);
  card.style.display = "block";
  stopBtn.style.display = "inline-flex"; startBtn.style.display = "none";
  goTo(0);
}
function hideTour() {
  running = false;
  overlay.style.display = "none"; hi.style.display = "none"; card.style.display = "none";
  stopBtn.style.display = "none"; startBtn.style.display = "inline-flex";
  stopVideo();
  if (waitCleanup) { waitCleanup(); waitCleanup = null; }
  waitSatisfied = false;
  if (actionCleanup) { actionCleanup(); actionCleanup = null; }
  actionDone = false; setStatus(""); setNextEnabled(true);
  currentHighlightedElement = null;
}

function computeHighlightRect(el) {
  const r = el.getBoundingClientRect();
  const fr = frame.getBoundingClientRect();
  const pad = 9;
  const rect = { left: fr.left+r.left, top: fr.top+r.top, right: fr.left+r.right, bottom: fr.top+r.bottom, width: r.width, height: r.height };
  hi.style.display = "block";
  hi.style.left   = (rect.left  - pad) + "px";
  hi.style.top    = (rect.top   - pad) + "px";
  hi.style.width  = (rect.width + pad*2) + "px";
  hi.style.height = (rect.height + pad*2) + "px";
  return rect;
}
function highlight(selector) {
  const doc = frame.contentWindow?.document;
  if (!doc || !selector) { hi.style.display = "none"; currentHighlightedElement = null; return null; }
  const el = doc.querySelector(selector);
  if (!el) { hi.style.display = "none"; currentHighlightedElement = null; return null; }
  currentHighlightedElement = el;
  return computeHighlightRect(el);
}
function updateHighlightPosition() {
  if (!currentHighlightedElement || !running) return;
  const rect = computeHighlightRect(currentHighlightedElement);
  placeCardNear(rect);
}
function placeCardNear(rect) {
  const cardH = card.offsetHeight || 260;
  const cardW = card.offsetWidth  || 680;
  const navH  = 58;
  let top, left;
  if (rect) {
    const spaceBelow = window.innerHeight - rect.bottom;
    const spaceAbove = rect.top - navH;
    const isDD = currentHighlightedElement?.tagName === "SELECT";
    if (isDD && spaceAbove > cardH + 50) top = Math.max(navH + 10, rect.top - cardH - 36);
    else if (spaceBelow > cardH + 36)   top = rect.bottom + 12;
    else if (spaceAbove > cardH + 36)   top = Math.max(navH + 10, rect.top - cardH - 12);
    else                                top = Math.max(navH + 10, Math.min(rect.top, window.innerHeight - cardH - 12));
    left = Math.min(Math.max(14, rect.left), window.innerWidth - cardW - 14);
  } else {
    left = Math.max(14, (window.innerWidth - cardW) / 2);
    top  = Math.max(navH + 20, window.innerHeight * 0.14);
  }
  card.style.top  = top  + "px";
  card.style.left = left + "px";
}

function setupWaitForClick(selector) {
  if (waitCleanup) { waitCleanup(); waitCleanup = null; }
  waitSatisfied = false;
  if (!selector) { setNextEnabled(true); return; }
  const doc = frame.contentWindow?.document;
  if (!doc) { setNextEnabled(true); return; }
  const el = doc.querySelector(selector);
  if (!el) { setNextEnabled(true); return; }
  setNextEnabled(false);
  const onClick = () => {
    waitSatisfied = true; setNextEnabled(true);
    el.removeEventListener("click", onClick, true); waitCleanup = null;
  };
  el.addEventListener("click", onClick, true);
  waitCleanup = () => el.removeEventListener("click", onClick, true);
}

function setupActionWatcher(action) {
  if (actionCleanup) { actionCleanup(); actionCleanup = null; }
  actionDone = false;
  if (!action) { setStatus(""); return; }
  const doc = frame.contentWindow?.document;
  if (!doc) { setStatus(""); return; }
  const el = doc.querySelector(action.selector);
  if (!el) { setStatus(""); return; }
  setStatus(action.prompt || "Try this now…", false);
  const markDone = () => {
    if (actionDone) return; actionDone = true;
    setStatus(action.doneText || "Done ✅", true);
  };
  if (action.type === "change") {
    el.addEventListener("change", markDone, true);
    actionCleanup = () => el.removeEventListener("change", markDone, true);
  } else if (action.type === "click") {
    const fn = () => { markDone(); if (action.hideCardAfterClick) card.style.display = "none"; };
    el.addEventListener("click", fn, true);
    actionCleanup = () => el.removeEventListener("click", fn, true);
  } else if (action.type === "input") {
    const fn = () => { if ((el.value ?? "").toString().trim().length) markDone(); };
    el.addEventListener("input", fn, true);
    actionCleanup = () => el.removeEventListener("input", fn, true);
  } else if (action.type === "observeTextChange") {
    const init = (el.textContent || "").trim();
    const check = () => { const n = (el.textContent || "").trim(); return n && n !== init; };
    if (check()) { markDone(); return; }
    const obs = new MutationObserver(() => { if (check()) { markDone(); obs.disconnect(); actionCleanup = null; } });
    obs.observe(el, { childList: true, subtree: true, characterData: true });
    actionCleanup = () => obs.disconnect();
  } else if (action.type === "observe") {
    const check = () => {
      if (action.classIncludes && !el.classList.contains(action.classIncludes)) return false;
      if (action.textIncludes && !(el.textContent || "").trim().includes(action.textIncludes)) return false;
      return true;
    };
    if (check()) { markDone(); return; }
    const obs = new MutationObserver(() => { if (check()) { markDone(); obs.disconnect(); actionCleanup = null; } });
    obs.observe(el, { attributes: true, attributeFilter: ["class"], childList: true, subtree: true, characterData: true });
    actionCleanup = () => obs.disconnect();
  } else { setStatus(""); }
}

function render() {
  const step = STEPS[idx];
  setOverlayDim(step.dim !== false);

  /* Progress bar */
  progressBar.style.width = ((idx + 1) / STEPS.length * 100) + "%";
  stepNumEl.textContent = idx + 1;

  titleEl.textContent = step.title;
  if (step.html) textEl.innerHTML = step.html;
  else textEl.innerHTML = (step.text || "").split("\n\n").map(p => `<p>${p}</p>`).join("");

  stepEl.textContent = `${idx + 1} of ${STEPS.length}`;
  backBtn.disabled = idx === 0;
  backBtn.style.display = STEPS[idx].hideBack ? "none" : "inline-flex";
  nextBtn.textContent = (idx === STEPS.length - 1) ? (STEPS[idx].nextLabel || "Done") : "Next →";

  stopVideo(); stopImage();

  const measuresLink = document.getElementById("measuresLink");
  measuresLink.style.display = step.showMeasuresLink ? "inline-flex" : "none";

  const rect = highlight(step.selector);
  if (!step.selector) hi.style.display = "none";
  placeCardNear(rect);

  setupActionWatcher(step.action);
  playVideo(step.video);
  showImage(step.image, step.imageAlt);

  if (step.waitForClick) {
    setupWaitForClick(step.selector);
  } else {
    if (waitCleanup) { waitCleanup(); waitCleanup = null; }
    waitSatisfied = false; setNextEnabled(true);
  }
}

function goTo(n) { idx = Math.max(0, Math.min(STEPS.length - 1, n)); render(); }

startBtn.addEventListener("click", showTour);
stopBtn.addEventListener("click", hideTour);
nextBtn.addEventListener("click", () => {
  const step = STEPS[idx];
  if (step && step.nextUrl && idx === STEPS.length - 1) { window.location.href = step.nextUrl; return; }
  if (idx === STEPS.length - 1) hideTour(); else goTo(idx + 1);
});
backBtn.addEventListener("click", () => goTo(idx - 1));
skipBtn.addEventListener("click", () => { if (idx < STEPS.length - 1) goTo(idx + 1); else hideTour(); });
window.addEventListener("resize", () => { if (running) render(); });

/* ── Iframe load: inject keyboard styles + wire up helpers ── */
frame.addEventListener("load", () => {
  const iframeDoc = frame.contentWindow?.document;

  /* Inject keyboard visual polish */
  try {
    injectKeyboardStyles(iframeDoc);
  } catch (e) {
    /* Cross-origin: add KEYBOARD_STYLES string directly to demo-app.html instead */
    console.warn("[riaaz demo] Cross-origin iframe — paste KEYBOARD_STYLES into demo-app.html <style>.", e);
  }

  if (!iframeDoc) return;

  iframeDoc.addEventListener("scroll", () => { if (running && currentHighlightedElement) updateHighlightPosition(); }, true);
  let rafId;
  const updateLoop = () => { if (running && currentHighlightedElement) updateHighlightPosition(); rafId = requestAnimationFrame(updateLoop); };
  const _show = showTour;
  showTour = function () { _show(); rafId = requestAnimationFrame(updateLoop); };
  const _hide = hideTour;
  hideTour = function () { _hide(); if (rafId) cancelAnimationFrame(rafId); };
});

window.addEventListener("scroll", () => { if (running && currentHighlightedElement) updateHighlightPosition(); }, true);

window.addEventListener("message", (event) => {
  if (event.source !== frame.contentWindow) return;
  const data = event.data || {};
  if (data.type === "tour:resume") {
    const step = STEPS[idx];
    card.style.display = "block";
    if (step && step.resume) {
      titleEl.textContent = step.resume.title || step.title || "";
      if (step.resume.html) textEl.innerHTML = step.resume.html;
      else textEl.innerHTML = (step.resume.text || "").split("\n\n").map(p => `<p>${p}</p>`).join("");
      setStatus("", false);
      const rect = highlight(step.selector);
      placeCardNear(rect);
      stepEl.textContent = `${idx + 1} of ${STEPS.length}`;
      backBtn.disabled = idx === 0;
      nextBtn.textContent = idx === STEPS.length - 1 ? "Done" : "Next →";
      return;
    }
    render();
  }
});

/* Aurora canvas */
(function () {
  const cv = document.getElementById("aurora"), cx = cv.getContext("2d"); let W, H;
  function resize() { W = cv.width = innerWidth; H = cv.height = innerHeight; }
  window.addEventListener("resize", resize, { passive: true }); resize();
  const orbs = [
    { x:.15, y:.10, r:.42, col:[255,90,160],  vx:.00012, vy:.00008, t:0 },
    { x:.80, y:.08, r:.44, col:[155,110,255], vx:-.0001,  vy:.00007, t:2 },
    { x:.50, y:.88, r:.36, col:[255,60,120],  vx:.00006, vy:-.00009, t:4 },
    { x:.30, y:.55, r:.28, col:[200,130,255], vx:.00009, vy:.00011,  t:1 },
  ];
  function tick() {
    cx.clearRect(0,0,W,H);
    for (const o of orbs) {
      o.t += .004; o.x += Math.sin(o.t*1.3)*o.vx+o.vx*.3; o.y += Math.cos(o.t*.9)*o.vy+o.vy*.2;
      o.x=((o.x%1)+1)%1; o.y=((o.y%1)+1)%1;
      const gx=o.x*W, gy=o.y*H, gr=o.r*Math.min(W,H), g=cx.createRadialGradient(gx,gy,0,gx,gy,gr);
      const [r,gb,b]=o.col;
      g.addColorStop(0,`rgba(${r},${gb},${b},0.18)`); g.addColorStop(.4,`rgba(${r},${gb},${b},0.07)`); g.addColorStop(1,`rgba(${r},${gb},${b},0)`);
      cx.fillStyle=g; cx.beginPath(); cx.arc(gx,gy,gr,0,Math.PI*2); cx.fill();
    }
    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
})();
</script>
