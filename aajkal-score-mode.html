<!-- ═══════════════════════════════════════════════════════════════
     CHANGE 1 of 4 — CSS
     Find this in your <style> block:

        #scorePageWrapper {
            position: relative;
            width: 100%;
            overflow: visible;
        }

     Replace with:
     ═══════════════════════════════════════════════════════════════ -->
<style>
#scorePageWrapper {
    position: relative;
    width: 100%;
    overflow: hidden;          /* clips the wide SVG — no manual scrolling */
}

/* ADD this new rule anywhere in <style>: */
#scoreObj {
    transition: transform 0.45s cubic-bezier(0.4, 0, 0.2, 1);
    will-change: transform;
    transform-origin: left top;
}
</style>


<!-- ═══════════════════════════════════════════════════════════════
     CHANGE 2 of 4 — renderScorePage JS
     Find this inside the function:

        svgEl.style.width  = '100%';
        svgEl.style.height = 'auto';
        svgEl.removeAttribute('width');
        svgEl.removeAttribute('height');

     Replace with:
     ═══════════════════════════════════════════════════════════════ -->
<script>
// ── renderScorePage replacement snippet ──
// (replace only the 4 lines above + add the two reset lines below)

svgEl.style.width  = '300vw';   // 3× viewport — change to 400vw for even more zoom
svgEl.style.height = 'auto';
svgEl.removeAttribute('width');
svgEl.removeAttribute('height');

// Reset pan position when page changes
document.getElementById('scoreObj').style.transform = 'translateX(0px)';

</script>


<!-- ═══════════════════════════════════════════════════════════════
     CHANGE 3 of 4 — add state + pan function
     Find this line near the top of your <script type="module">:

        let _svgNoteElements = [];
        let _currentHighlightEl = null;

     ADD these lines directly AFTER them:
     ═══════════════════════════════════════════════════════════════ -->
<script>
let _lastPannedMeasure = -1;   // ADD after _currentHighlightEl declaration

// ADD this entire function somewhere before _highlightSvgNote:
function _panScoreToEntry(entry) {
    // Defer one frame so the SVG highlight paint has settled
    requestAnimationFrame(() => {
        const wrapper  = document.getElementById('scorePageWrapper');
        const scoreObj = document.getElementById('scoreObj');
        if (!wrapper || !scoreObj || !entry) return;

        const noteRect    = entry.el.getBoundingClientRect();
        const wrapperRect = wrapper.getBoundingClientRect();

        // Current translateX (from CSS transform)
        const matrix   = new DOMMatrix(getComputedStyle(scoreObj).transform);
        const currentX = matrix.m41;

        // Align the note's left edge to the wrapper's left edge + small padding
        const PADDING = 20;
        const delta   = (wrapperRect.left + PADDING) - noteRect.left;
        const newX    = currentX + delta;

        // Never scroll past the start of the SVG (don't go positive)
        scoreObj.style.transform = `translateX(${Math.min(0, newX)}px)`;
    });
}
</script>


<!-- ═══════════════════════════════════════════════════════════════
     CHANGE 4 of 4 — _highlightSvgNote  (measure-gate the pan)
