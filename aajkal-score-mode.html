   :root{
  --bg-main: #ffffff;          /* ✅ keep WHITE background */
  --bg-surface: rgba(255,255,255,0.86);

  --red1: rgba(235, 50, 70, 0.22);
  --red2: rgba(255, 120, 130, 0.16);
  --softBlack: rgba(0, 0, 0, 0.10);

--accent-primary: #E57373;   /* light red */
  --accent-success: #22C55E;
  --accent-error: #EF4444;

  --text-main: #1A1A1F;
  --border-soft: rgba(235, 50, 70, 0.18);
}

body {
    margin: 0;
    padding: 80px 0 40px 0; /* room for brand bar + heading */
    /* 🔼 nudges everything up */
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    align-items: center;

    font-family: 'Inter', system-ui, -apple-system, sans-serif;
background:
  radial-gradient(900px 520px at 20% 0%, var(--red1), transparent 60%),
  radial-gradient(900px 520px at 85% 10%, var(--softBlack), transparent 62%),
  radial-gradient(780px 480px at 50% 80%, var(--red2), transparent 60%),
  radial-gradient(520px 320px at 35% 55%, rgba(235, 50, 70, 0.10), transparent 60%),
  var(--bg-main);

    color: var(--text-main);
}
h1 {
    font-size: clamp(32px, 6vw, 60px);
    color: var(--text-main);
    text-align: center;

    margin-top: 12px;      /* 🔽 kills the huge gap */
    margin-bottom: 13px;  /* slightly tighter */
}
button {
    padding: clamp(8px, 2vw, 15px) clamp(14px, 4vw, 30px);
    font-size: clamp(14px, 2.2vw, 18px);

    background-color: var(--accent-primary);
    color: white;

    border: none;
    border-radius: 10px;
    cursor: pointer;

    transition: background-color 0.2s, transform 0.15s;
}

button:hover:not(:disabled) {
    background-color: #EF5350;
    transform: translateY(-1px);
}

button:disabled {
    background-color: #cccccc;
    cursor: not-allowed;
}

    button:disabled { background-color: #cccccc; cursor: not-allowed; }
    .button-group {
    display: flex;
    flex-wrap: wrap;        /* ✅ ADD THIS */
    gap: 10px;
    margin-top: 20px;
    justify-content: center;
}
    
#stopButton {
    background-color: var(--accent-error);
}

#stopButton:hover:not(:disabled) {
    background-color: #DC2626;
}
    #feedback {
    /* animation */
    opacity: 0;
    transform: scale(0.96);
    transition:
        opacity 0.25s ease,
        transform 0.25s ease,
        background-color 0.25s ease;

    /* visual */
    border-radius: 14px;
    padding: 12px 18px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.12);

    /* FIX 1 — prevent full-width banner */
    max-width: 520px;
    width: fit-content;
    margin: 6px auto 0 auto;
    text-align: center;

    /* ✅ FIX 2 — reserve vertical space (THIS IS THE ANSWER) */
}
#feedback.show {
    opacity: 1;
    transform: scale(1);
}

#feedback.correct {
    background-color: var(--accent-success);
    color: white;
}

#feedback.wrong {
    background-color: var(--accent-error);
    color: white;
}
/* 🎵 Note feedback circles */
.note-feedback {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 6px;
    flex-wrap: wrap;
}

/* 🎨 Circle color rules */
.note-circle {
    width: 42px;
    height: 42px;
    border-radius: 50%;

    background: #e5e7eb; /* neutral gray */
    color: #111;

    font-weight: 700;
    font-size: 14px;

    display: flex;
    align-items: center;
    justify-content: center;

    box-shadow: 0 3px 10px rgba(0,0,0,0.15);
}

.note-circle.correct {
    background: #E57373; /* LIGHT RED */

}

.note-circle.wrong {
    background: #EF4444; /* RED */

}

.note-label {
    font-size: 14px;
    font-weight: 600;

}

.note-explanation {

}
#feedback .note-circle {
    color: inherit;
}

#holdInfo {
    font-size: 18px;
    font-weight: 600;
    text-align: center;
}
#notesDisplay {
    display: none !important;  /* 🔒 hard lock */
}

#midiDisplay h3 {

#notesList {

#midiDisplay {

#midiDisplay > div:not(:empty) {

.music-symbol {

}
/* 🎯 Right-side fixed note feedback */
#sideNoteFeedback {

/* 🟦 Free Mode button — fixed above side note circles */

canvas {

canvas {

#trainingProgress {

#trainingProgressFill {

#trainingProgressText {

    top: -24px;
    right: 0;
    font-size: 14px;
    font-weight: 600;
    color: var(--text-main);
}
/* ⬇️ Push canvas + keyboard + controls to bottom */
#bottomDock {
    margin-top: auto;
    padding-top: 100px;   /* 👈 PUSHES KEYBOARD + BUTTONS DOWN */
    padding-bottom: 80px;

    display: flex;

}
/* 🎵 Falling note visual style */
.falling-note {

}
/* 🔒 Paywall card - smaller + centered text */
#paywall{
  display: none;                 /* keep hidden until you show it in JS */
  width: min(420px, 92%);        /* ✅ smaller box */
  padding: 16px 18px;
  margin: 14px auto;
  border: 1px solid rgba(235,50,70,0.22);
  border-radius: 16px;
  background: rgba(255,255,255,0.88);
  box-shadow: 0 10px 26px rgba(0,0,0,0.08);

}

/* Title */

}

/* Description */

/* Button - centered, not huge */
#buyBtn{

}
/* 🔒 Default: hide the app until unlocked */
#app { display: none; }

/* ============================
   SCORE MODE — KEYBOARD STRIP
   ============================ */

/* When score mode is active, pin the keyboard dock to the bottom of the
   viewport so it's always visible regardless of score height */
#bottomDock.score-mode {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 900;

    padding-top: 8px;
    padding-bottom: 8px;

    background: rgba(255, 255, 255, 0.96);
    backdrop-filter: blur(8px);
    border-top: 1px solid rgba(235, 50, 70, 0.18);
    box-shadow: 0 -4px 20px rgba(0,0,0,0.08);

    /* Keep children centered */
    display: flex;
    flex-direction: column;
    align-items: center;
}

/* Add bottom padding to scoreView so keyboard doesn't cover score content */
#scoreView.active {
    padding-bottom: 280px;
}

/* Hide only the falling-note portion of the canvas by clipping
   to just the keyboard height — done via JS resize */
#bottomDock.score-mode #canvas {
    /* canvas height is set to KEYBOARD_HEIGHT in JS */
    max-width: 100%;
}

/* Hide bulky controls from the pinned dock in score mode */
#bottomDock.score-mode #holdInfo,
#bottomDock.score-mode #feedback,
#bottomDock.score-mode #sideNoteFeedback {
    display: none !important;
}

/* In score mode, show controls compactly above the keyboard */
#bottomDock.score-mode #playbackControls {
    display: flex !important;
    flex-wrap: wrap;
    justify-content: center;
    gap: 6px;
    padding: 4px 8px 2px 8px;
    max-width: 100%;
    overflow-x: auto;
    font-size: 13px;
}

#bottomDock.score-mode #playbackControls button {
    padding: 5px 10px;
    font-size: 12px;
    border-radius: 7px;
}

#bottomDock.score-mode #practiceControls {
    gap: 6px;
}

#bottomDock.score-mode #practiceControls label {
    font-size: 12px;
}

#bottomDock.score-mode #practiceControls input,
#bottomDock.score-mode #practiceControls select {
    font-size: 12px;
}

/* Keyboard strip label */
#scoreKeyboardLabel {
    display: none;
    font-size: 13px;
    font-weight: 600;
    color: var(--accent-primary);
    letter-spacing: 0.4px;
    margin-bottom: 4px;
    text-align: center;
    opacity: 0.85;
}

#bottomDock.score-mode #scoreKeyboardLabel {
    display: block;
}

/* ============================
   SCORE VIEW TOGGLE
   ============================ */
#viewToggleBar {
    display: flex;
    align-items: center;
    gap: 12px;
    justify-content: center;
    margin: 10px 0 6px 0;
}

#viewToggleLabel {
    font-size: 15px;
    font-weight: 600;
    color: var(--text-main);
}

/* Toggle switch */
.toggle-switch {
    position: relative;
    width: 56px;
    height: 28px;
    cursor: pointer;
}

.toggle-switch input {
    opacity: 0;
    width: 0;
    height: 0;
    position: absolute;
}

.toggle-track {
    position: absolute;
    inset: 0;
    background: #ccc;
    border-radius: 999px;
    transition: background 0.25s;
}

.toggle-switch input:checked + .toggle-track {
    background: var(--accent-primary);
}

.toggle-thumb {
    position: absolute;
    top: 3px;
    left: 3px;
    width: 22px;
    height: 22px;
    background: white;
    border-radius: 50%;
    box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    transition: transform 0.25s;
}

.toggle-switch input:checked ~ .toggle-thumb {
    transform: translateX(28px);
}

/* Score container */
#scoreView {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 0;
    width: 100%;
    max-width: 900px;
    margin: 0 auto;
    position: relative;
}

#scoreView.active {
    display: flex;
}

#scorePageWrapper {
    position: relative;
    width: 100%;
}

#scoreImg {
    width: 100%;
    display: block;
    border: 1px solid rgba(235,50,70,0.15);
    border-radius: 8px;
    background: white;
}

/* Highlight overlay on score */
#scoreHighlight {
    position: absolute;
    pointer-events: none;
    border: 3px solid #E57373;
    border-radius: 6px;
    background: rgba(229,115,115,0.28);
    box-shadow: 0 0 0 4px rgba(229,115,115,0.18), 0 0 16px rgba(229,115,115,0.35);
    transition: left 0.15s ease, top 0.15s ease, width 0.15s ease, height 0.15s ease, opacity 0.2s;
    opacity: 0;
    animation: none;
}

#scoreHighlight.visible {
    opacity: 1;
    animation: scorePulse 1.1s ease-in-out infinite;
}

@keyframes scorePulse {
    0%, 100% { box-shadow: 0 0 0 4px rgba(229,115,115,0.18), 0 0 16px rgba(229,115,115,0.35); }
    50%       { box-shadow: 0 0 0 8px rgba(229,115,115,0.10), 0 0 28px rgba(229,115,115,0.55); }
}

/* Score page nav */
#scorePageNav {
    display: flex;
    align-items: center;
    gap: 14px;
    margin: 8px 0 4px 0;
}

#scorePageNav button {
    padding: 6px 16px;
    font-size: 14px;
}

#scorePageLabel {
    font-size: 15px;
    font-weight: 600;
}

/* Current note badge on score view */
#scoreNoteDisplay {
    display: none;
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(255,255,255,0.95);
    border: 2px solid var(--accent-primary);
    border-radius: 16px;
    padding: 10px 22px;
    font-size: 18px;
    font-weight: 700;
    color: var(--text-main);
    box-shadow: 0 6px 24px rgba(0,0,0,0.13);
    z-index: 5000;
    text-align: center;
    gap: 10px;
}

#scoreNoteDisplay.active {
    display: flex;
    align-items: center;
}

#scoreNoteName {
    font-size: 28px;
    font-weight: 800;
    color: var(--accent-primary);
    min-width: 60px;
    text-align: center;
}

</style>

// ================================
// ================================
// REPEAT MODEL (MIDI IS EXPANDED)
// Physical measures are MIDI timeline (1..SONG_CONFIG.measures)
// Logical measures are sheet numbers (what user types in)
// Repeat section: 7..14 is duplicated once in the MIDI timeline
// ================================
const REPEAT_START = 29;
const REPEAT_END = 36;  // Measures 29-36 repeat
const REPEAT_LEN = 8;  // 8 measures are repeated (29, 30, 31, 32, 33, 34, 35, 36)
function buildPhysicalToLogicalMap(config) {
  const map = [];

  for (let p = 1; p <= config.measures; p++) {
    let logical;

    // 1..28 -> 1..28 (before repeat)
    if (p <= 28) {
      logical = p;
    }
    // 29..36 -> 29..36 (first occurrence)
    else if (p <= 36) {
      logical = p;
    }
    // 37..44 -> 29..36 (repeated copy)
    else if (p <= 36 + REPEAT_LEN) {
      logical = REPEAT_START + (p - 37);
    }
    // 45+ -> 37+ (after repeat)
    else {
      logical = p - REPEAT_LEN;
    }

    map[p] = logical;
  }

  return map;
}
const PHYSICAL_TO_LOGICAL = buildPhysicalToLogicalMap(SONG_CONFIG);

let MAX_LOGICAL_MEASURE = 0;
for (let p = 1; p <= SONG_CONFIG.measures; p++) {
  MAX_LOGICAL_MEASURE = Math.max(MAX_LOGICAL_MEASURE, PHYSICAL_TO_LOGICAL[p] || 0);
}


async function loadSongMidi() {
    const response = await fetch("aajkal.mid");
    const arrayBuffer = await response.arrayBuffer();

    currentMidi = new Midi(arrayBuffer);

    allMidiNotes = [];

currentMidi.tracks.forEach((track, trackIndex) => {
        // Track 0 = TREBLE (right hand), Track 1 = BASS (left hand)
        const clef = trackIndex === 0 ? TREBLE : BASS;

        track.notes.forEach(note => {
            allMidiNotes.push({
                midi: note.midi,
                time: note.time,
                duration: note.duration,
                track: clef
            });

    allMidiNotes.sort((a, b) => a.time - b.time);
    allMidiNotes = splitRepeatedNotes(allMidiNotes);

// For 2/2 time (cut time): half note = 100 BPM
    // This means each quarter note = 200 BPM
    // But we count in half notes (minims), so use 100 BPM directly
    
    let bpm;
    if (SONG_CONFIG.timeSignature[0] === 2 && SONG_CONFIG.timeSignature[1] === 2) {
        // 2/2 time: half note (minim) = 100, so half note BPM = 100
        bpm = 100;

// ==================================
// MEASURE → TIME MAPPING
// ==================================
function buildMeasureTimeMap(config, secondsPerBeat) {
    const beatsPerMeasure = config.timeSignature[0];
    const secondsPerMeasure = beatsPerMeasure * secondsPerBeat;

    const map = {};

    for (let measure = 1; measure <= config.measures; measure++) {
        const startTime = (measure - 1) * secondsPerMeasure;
        const endTime = measure * secondsPerMeasure;

        map[measure] = {
            start: startTime,
            end: endTime
        };
    }

    return map;
}
// ================================
// TIME → MEASURE LOOKUP
// ================================
function getMeasureFromTime(timeSeconds) {
    const EPS = 1e-6;
    const m = Math.floor((timeSeconds + EPS) / secondsPerMeasure) + 1;
    if (m < 1 || m > SONG_CONFIG.measures) return null;
    return m;
}


function getLogicalSheetMeasureFromTime(timeSeconds) {
  const physicalMeasure = getMeasureFromTime(timeSeconds);
  if (physicalMeasure === null) return null;
  return PHYSICAL_TO_LOGICAL[physicalMeasure] ?? null;
}

// PRACTICE SEQUENCE BUILDER (PHYSICAL MEASURES)
// ================================

// first physical occurrence of a logical bar
function logicalToPhysicalFirst(logical) {
  // 1..36 exist as-is in their first occurrence
  if (logical <= 36) return logical;

  // After the repeated chunk (measures 37-44 are the repeat of 29-36),
  // everything shifts forward by REPEAT_LEN
  return logical + REPEAT_LEN;
}

function logicalToPhysicalSecond(logical) {
  // Only bars 29-36 have a second occurrence
  if (logical < REPEAT_START || logical > REPEAT_END) return null;
  // 29->37, 30->38, 31->39, 32->40, 33->41, 34->42, 35->43, 36->44
  return logical + 8; // Shift by 8 (37 - 29)
}
// Builds the list of PHYSICAL measures we will include in practice playback
// ✅ FIXED VERSION
function buildPhysicalPracticeMeasureSequence(startLogical, endLogical, skipRepeats) {
  if (startLogical > endLogical) return null;

  console.log("🔍 Building sequence for logical", startLogical, "to", endLogical);
  console.log("   logicalToPhysicalFirst(21) =", logicalToPhysicalFirst(21));
  console.log("   logicalToPhysicalFirst(24) =", logicalToPhysicalFirst(24));
  console.log("   SONG_CONFIG.measures =", SONG_CONFIG.measures);

  const seq = [];
  const logicalSeq = [];

  // Skip repeats mode: straight line
  if (skipRepeats) {
    for (let l = startLogical; l <= endLogical; l++) {
      const p = logicalToPhysicalFirst(l);
      if (!p || p > SONG_CONFIG.measures) return null;
      seq.push(p);
      logicalSeq.push(l);
    }
    return { seq, logicalSeq };
  }

// Build the sequence manually for repeat mode
  // Case 1: Selection is entirely before measure 29 (measures 1-28)
  if (endLogical <= 28) {
    for (let l = startLogical; l <= endLogical; l++) {
      logicalSeq.push(l);
      seq.push(logicalToPhysicalFirst(l));
    }
  }
  // Case 2: Selection is entirely after measure 36 (measures 37+)
  else if (startLogical > 36) {
    for (let l = startLogical; l <= endLogical; l++) {
      logicalSeq.push(l);
      seq.push(logicalToPhysicalFirst(l));
    }
  }
  // Case 3: Selection spans across the repeat boundary
  else {
    // Play from start to 36 (first time through)
    for (let l = startLogical; l <= Math.min(36, endLogical); l++) {
      logicalSeq.push(l);
      seq.push(logicalToPhysicalFirst(l));
    }
    
    // Play repeat: 29 to 36 (second time)
    for (let l = 29; l <= 36; l++) {
      logicalSeq.push(l);
      seq.push(logicalToPhysicalSecond(l));
    }

    // Continue from 37 onwards (if selection extends past 36)
    if (endLogical > 36) {
      for (let l = 37; l <= endLogical; l++) {
        logicalSeq.push(l);
        seq.push(logicalToPhysicalFirst(l));
      }
    }
  }
  return { seq, logicalSeq };
}

function beatsToNoteName(beats) {
    const values = [
    { beats: 4, name: "○" },
{ beats: 3, name: "d." },
{ beats: 2, name: "d" },
{ beats: 1.5, name: "♩." },
{ beats: 1, name: "♩" },
{ beats: 0.75, name: "♪." },
{ beats: 0.5, name: "♪" },
{ beats: 0.25, name: "♬" }
    ];

    let closest = values[0];
    let smallestDiff = Math.abs(beats - values[0].beats);

    for (const v of values) {
        const diff = Math.abs(beats - v.beats);
        if (diff < smallestDiff) {
            smallestDiff = diff;
            closest = v;
        }
    }

    return closest.name;
}

        6: "the first black key in a group of 3 (F#)",
        7: "the white key between the first and second black keys (G)",
        8: "the second black key in a group of 3 (G#)",
        9: "the white key between the second and third black keys (A)",
        10:"the third black key in a group of 3 (A#)",
        11:"the white key just after the group of 3 black keys (B)"
    };

    return descriptions[noteInOctave] || "";
}
function blackKeyGroupForMidi(midi) {
    const pitch = midi % 12;

    // Group of 2 black keys: C#, D#
    if (pitch === 1 || pitch === 3) return "2";

    // Group of 3 black keys: F#, G#, A#
    if (pitch === 6 || pitch === 8 || pitch === 10) return "3";

    return null;
}

function getCountWord(beatIndex, subdivision = false) {
    const beat = (beatIndex % 4) + 1;

    const words = {
        en: {
            numbers: ["one", "two", "three", "four"],
            and: "and"
        },
        it: {
            numbers: ["uno", "due", "tre", "quattro"],
            and: "e"
        }
    };

    const lang = words[countLanguage] || words.en;

    if (countMode === "subdivision") {
        return subdivision ? lang.and : String(beat);
    }

    return lang.numbers[beat - 1];
}

function startMetronome(startTimeOverride = null) {
    stopMetronome();

    transportStartTime = startTimeOverride ?? performance.now();
    metronomeRunning = true;

    if (!metroSynth) {
        metroSynth = new Tone.NoiseSynth({
            noise: { type: "white" },
            envelope: { attack: 0.001, decay: 0.03, sustain: 0 },
            volume: -6
        }).toDestination();
    }

    const bpm = (60 / secondsPerBeat) * speedMultiplier;

    // 🔒 ALWAYS run at subdivision resolution (half-beat)
    const stepMs = (60000 / bpm) / 2;

    let lastStep = -1;

    function tick() {
        if (!metronomeRunning) return;

        const elapsed = performance.now() - transportStartTime;
        const step = Math.floor(elapsed / stepMs);

        if (step !== lastStep) {
            lastStep = step;

            const isMainBeat = step % 2 === 0;
            const beatIndex = Math.floor(step / 2);

            // 🔊 BEAT CLICK (quarters only)
            if (beatEnabled && isMainBeat) {
                metroSynth.triggerAttackRelease("16n");
            }

            // 🗣️ COUNTING
            if (countEnabled && speechSynth) {
                let word = null;

                if (isMainBeat) {
                    word = getCountWord(beatIndex, false);
                } else if (subdivisionEnabled) {
                    word = getCountWord(beatIndex, true);
                }

                if (word) {
                    speechSynth.cancel();
                    const u = new SpeechSynthesisUtterance(word);
                    u.volume = isMainBeat ? 1 : 0.6;
                    u.rate = 1;
                    speechSynth.speak(u);
                }
            }
        }

        metroInterval = requestAnimationFrame(tick);
    }

    tick();
}

function getMidiFromMouse(x, y) {
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    
    x = x * scaleX;
    y = y * scaleY;
    
    // In score mode, canvas is only KEYBOARD_HEIGHT tall, so keyboard starts at 0
    const keyboardTop = scoreModeActive ? 0 : canvas.height - KEYBOARD_HEIGHT;
    if (y < keyboardTop) return null;

    const whiteKeyWidth = getWhiteKeyWidth();
    const blackKeyWidth = whiteKeyWidth * 0.6;
    const blackKeyHeight = KEYBOARD_HEIGHT * 0.6;

    let whiteIndex = 0;
    for (let midi = START_NOTE; midi <= END_NOTE; midi++) {
        if (!isBlackMidi(midi)) {
            whiteIndex++;
            continue;
        }
        const bx = (whiteIndex - 1) * whiteKeyWidth + whiteKeyWidth * 0.7;
        if (
            x >= bx &&
            x <= bx + blackKeyWidth &&
            y >= keyboardTop &&
            y <= keyboardTop + blackKeyHeight
        ) {
            return midi;
        }
    }
    return xToMidi(x);
}

canvas.addEventListener('touchstart', async (e) => {
    if (previewMode) return;
    e.preventDefault();
    await Tone.start();

    touchActive = true;
    mouseDown = true;

    const rect = canvas.getBoundingClientRect();

    // Process all new touches
    for (let i = 0; i < e.changedTouches.length; i++) {
        const touch = e.changedTouches[i];
        const x = touch.clientX - rect.left;
        const y = touch.clientY - rect.top;

        const keyboardStartY = scoreModeActive ? 0 : (canvas.height - KEYBOARD_HEIGHT) * (rect.height / canvas.height);
        if (y < keyboardStartY) continue;

        const midiNote = getMidiFromMouse(x, y);
        if (midiNote === null) continue;

        // Store this touch
        activeTouches.set(touch.identifier, midiNote);

        // Trigger the note
        processUserNoteOn(midiNote);
    }
}, { passive: false });

canvas.addEventListener('touchmove', (e) => {
    if (!touchActive) return;
    e.preventDefault();

    const rect = canvas.getBoundingClientRect();

    // Update each moving touch
    for (let i = 0; i < e.changedTouches.length; i++) {
        const touch = e.changedTouches[i];
        const x = touch.clientX - rect.left;
        const y = touch.clientY - rect.top;

        const keyboardStartY = scoreModeActive ? 0 : (canvas.height - KEYBOARD_HEIGHT) * (rect.height / canvas.height);
        if (y < keyboardStartY) continue;

        const midiNote = getMidiFromMouse(x, y);
        if (midiNote === null) continue;

        const oldNote = activeTouches.get(touch.identifier);

        // Only trigger if the note changed
        if (oldNote !== midiNote) {
            activeTouches.set(touch.identifier, midiNote);
            processUserNoteOn(midiNote);
        }
    }
}, { passive: false });

canvas.addEventListener('touchend', (e) => {
    if (!touchActive) return;
    e.preventDefault();

    // Process each released touch
    for (let i = 0; i < e.changedTouches.length; i++) {
        const touch = e.changedTouches[i];
        const midiNote = activeTouches.get(touch.identifier);

        if (midiNote !== undefined) {
            // Release this specific note
            if (freeMode && midiNote === freeModeActiveNote) {
                freeModeSynth.triggerRelease(getNoteName(midiNote));
                freeModeActiveNote = null;
                expectedMidiNote = null;
                expectedMidiTreble.clear();
            } else if (synth) {
                synth.triggerRelease(getNoteName(midiNote));
            }

            // Remove from pressed notes in training mode
            midiPressedNotes.delete(midiNote);

            // Remove this touch
            activeTouches.delete(touch.identifier);
        }
    }

    // If all touches are released, check hold duration
    if (e.touches.length === 0) {
        touchActive = false;
        mouseDown = false;
        activeTouches.clear();

        // Check hold duration if in training mode
        if (!freeMode && noteHoldStartTime !== null) {
            const heldTime = performance.now() - noteHoldStartTime;

            if (heldTime >= expectedHoldDuration) {
                const feedback = document.getElementById('feedback');
                feedback.textContent = 'Good!';

                feedback.classList.remove('correct', 'wrong', 'show');
                void feedback.offsetWidth;
                feedback.classList.add('correct', 'show');

                waitingForInput = false;
                expectedMidiNote = null;

                expectedMidiTreble.clear();
                expectedMidiBass.clear();

                trainingIndex += currentChordNotes.size;
                updateTrainingProgress();

                document.getElementById('holdInfo').textContent = '';
                setTimeout(() => spawnNextValidNote(), 300);

            } else {
                const heldBeats = heldTime / 1000 / secondsPerBeat;
                const expectedBeats = expectedHoldDuration / 1000 / secondsPerBeat;

                const feedback = document.getElementById('feedback');
                feedback.innerHTML = `You held <span class="music-symbol">${beatsToNoteName(heldBeats)}</span>. Let's try holding a little longer!`;

                feedback.classList.remove('correct', 'wrong', 'show');
                void feedback.offsetWidth;
                feedback.classList.add('wrong', 'show');

                const holdEl = document.getElementById('holdInfo');
                holdEl.innerHTML = `Hold for <span class="music-symbol">${beatsToNoteName(expectedBeats)}</span>`;

                if (retryTimeout) {
                    clearTimeout(retryTimeout);
                }

                retryTimeout = setTimeout(() => {
                    spawnTrainingNote(practiceNotes[trainingIndex]);
                }, 600);
            }

            noteHoldStartTime = null;
            activeMidiNote = null;
        }
    }
}, { passive: false });

canvas.addEventListener('touchcancel', (e) => {
    if (!touchActive) return;
    e.preventDefault();

    // Release all cancelled touches
    for (let i = 0; i < e.changedTouches.length; i++) {
        const touch = e.changedTouches[i];
        const midiNote = activeTouches.get(touch.identifier);

        if (midiNote !== undefined && synth) {
            synth.triggerRelease(getNoteName(midiNote));
            midiPressedNotes.delete(midiNote);
            activeTouches.delete(touch.identifier);
        }
    }

    if (e.touches.length === 0) {
        touchActive = false;
        mouseDown = false;
        activeTouches.clear();
    }
}, { passive: false });

// MIDI handling
async function initMIDI() {
    if(!navigator.requestMIDIAccess){ console.log('Web MIDI API not supported'); return; }
    try {
        const midiAccess = await navigator.requestMIDIAccess();
        for(const input of midiAccess.inputs.values()){
            midiInputs.push(input);
            input.onmidimessage = handleMIDIMessage;
        }
        midiAccess.onstatechange = (event)=>{
            if(event.port.state==='connected' && event.port.connection==='open' && event.port.type==='input'){
                midiInputs.push(event.port);
                event.port.onmidimessage=handleMIDIMessage;
            } else if(event.port.state==='disconnected'){
                const idx = midiInputs.indexOf(event.port);
                if(idx>-1) midiInputs.splice(idx,1);
            }
        }
    } catch(err){ console.error(err); }
}

function splitRepeatedNotes(notes, gapSeconds = NOTE_GAP_TIME) {
    const result = [];

    for (let i = 0; i < notes.length; i++) {
        const current = notes[i];
        const prev = result[result.length - 1];

        if (
            prev &&
            prev.midi === current.midi &&
            prev.track === current.track &&
            Math.abs((prev.time + prev.duration) - current.time) < 0.001
        ) {
            // shorten previous note slightly
            prev.duration = Math.max(
                0,
                prev.duration - gapSeconds
            );

            // push current note slightly later
            result.push({
                ...current,
                time: current.time + gapSeconds
            });
        } else {
            result.push({ ...current });
        }
    }

    return result;
}


function removeRepeatedMeasures(notes, secondsPerMeasure) {
    const measures = new Map();
    const result = [];

    for (const note of notes) {
        const measureIndex = Math.floor(note.time / secondsPerMeasure);

        if (!measures.has(measureIndex)) {
            measures.set(measureIndex, []);
        }

        measures.get(measureIndex).push(note);
    }

    const seenSignatures = new Set();

    for (const [measureIndex, measureNotes] of measures.entries()) {
        const signature = JSON.stringify(
            measureNotes.map(n => [
                n.midi,
                +(n.time % secondsPerMeasure).toFixed(3),
                +n.duration.toFixed(3),
                n.track
            ])
        );

        if (seenSignatures.has(signature)) {
            continue;
        }

        seenSignatures.add(signature);
        result.push(...measureNotes);
    }

    return result.sort((a, b) => a.time - b.time);
}

function reportEmptyLogicalMeasures(startLogical, endLogical, notes) {
    const counts = new Map();
    for (let m = startLogical; m <= endLogical; m++) counts.set(m, 0);

    for (const n of notes) {
        const lm = (n.logicalMeasure ?? getLogicalSheetMeasureFromTime(n.time));
        if (lm !== null && lm >= startLogical && lm <= endLogical) {
            counts.set(lm, (counts.get(lm) || 0) + 1);
        }
    }

    const empty = [];
    for (let m = startLogical; m <= endLogical; m++) {
        if ((counts.get(m) || 0) === 0) empty.push(m);
    }

    console.log("Notes per logical bar:", Object.fromEntries(counts));
    if (empty.length) console.warn("Empty logical bars in this hand:", empty.join(", "));
    return empty;
}

async function renderScorePage(pageNum) {
    if (!pdfDoc) return;
    if (scoreCanvases[pageNum]) {
        document.getElementById('scoreImg').src = scoreCanvases[pageNum];
        updateScorePageLabel();
        return;
    }

    const page = await pdfDoc.getPage(pageNum);
    const viewport = page.getViewport({ scale: 2.0 }); // high-res

    const offCanvas = document.createElement('canvas');
    offCanvas.width  = viewport.width;
    offCanvas.height = viewport.height;
    const offCtx = offCanvas.getContext('2d');

    await page.render({ canvasContext: offCtx, viewport }).promise;

    const dataUrl = offCanvas.toDataURL('image/png');
    scoreCanvases[pageNum] = dataUrl;

    document.getElementById('scoreImg').src = dataUrl;
    updateScorePageLabel();
}

function updateScorePageLabel() {
    document.getElementById('scorePageLabel').textContent =
        `Page ${scoreCurrentPage} / ${SCORE_TOTAL_PAGES}`;
    document.getElementById('scorePrevBtn').disabled = scoreCurrentPage <= 1;
    document.getElementById('scoreNextBtn').disabled = scoreCurrentPage >= SCORE_TOTAL_PAGES;
}

document.getElementById('scorePrevBtn').addEventListener('click', async () => {
    if (scoreCurrentPage > 1) {
        scoreCurrentPage--;
        await renderScorePage(scoreCurrentPage);
        clearScoreHighlight();
        updateScorePageLabel();
    }
});

document.getElementById('scoreNextBtn').addEventListener('click', async () => {
    if (scoreCurrentPage < SCORE_TOTAL_PAGES) {
        scoreCurrentPage++;
        await renderScorePage(scoreCurrentPage);
        clearScoreHighlight();
        updateScorePageLabel();
    }
});

const scoreModeToggle = document.getElementById('scoreModeToggle');
scoreModeToggle.addEventListener('change', async () => {
    scoreModeActive = scoreModeToggle.checked;

    const bottomDock   = document.getElementById('bottomDock');
    const scoreView    = document.getElementById('scoreView');
    const scoreNoteDisplay = document.getElementById('scoreNoteDisplay');

    if (scoreModeActive) {
        // Switch to score view — but KEEP keyboard visible
        bottomDock.classList.add('score-mode');
        scoreView.classList.add('active');

        // Shrink canvas to keyboard-only height (no falling notes area)
        canvas.height = KEYBOARD_HEIGHT;
        drawKeyboard();

        // Load PDF lazily
        if (!pdfDoc) await initScoreMode();
        else await renderScorePage(scoreCurrentPage);

        // If practice is active, show note display and highlight score
        if (trainingActive && currentTrainingNote) {
            showScoreNoteDisplay(currentTrainingNote);
            highlightScoreNote(currentTrainingNote);
        }

    } else {
        // Back to falling notes — restore full canvas
        bottomDock.classList.remove('score-mode');
        scoreView.classList.remove('active');
        scoreNoteDisplay.classList.remove('active');
        clearScoreHighlight();

        // Restore normal canvas height
        resizeCanvas();
    }
});

// ---- Note highlighting on score ----
// We build a rough position map: given a note name (e.g. "E4") and the
// current measure, we estimate where on the score page it sits.
// This is a geometric approximation based on the known PDF layout.

// PDF is A4 landscape-ish, rendered at 2× scale.
// Page 1: measures 1-25ish  Page 2: 25-50ish  Page 3: 50+
// We use measure number + note pitch to compute x,y on the image.

// Score geometry constants (approximate, tuned to this specific PDF)
// These are fractions of image width/height
const SCORE_LAYOUT = {
    // Each page has 5 systems of 2 staves (treble + bass)
    systemsPerPage: 5,
    // Vertical positions of system tops (as fraction of image height)
    systemTopFractions: [0.08, 0.26, 0.44, 0.62, 0.80],
    systemHeightFraction: 0.14,
    // Treble staff sits at top of system, bass below
    trebleYFraction: 0.30,  // within system height
    bassYFraction: 0.70,
    // Horizontal: measures within a system
    measuresPerSystem: 4,
    leftMarginFraction: 0.10,
    rightMarginFraction: 0.96,
    // Note vertical: map MIDI pitch to y within staff
    // Treble staff range: C4(60) to G5(79)
    // Bass staff range: C2(36) to G3(55)
};

// Map pitch (MIDI) to y fraction within a staff (0=top line, 1=bottom line)
function midiToStaffYFraction(midiNote, isTreeble) {
    if (isTreeble) {
        // Treble: top line = E5(76), bottom line = E4(64)
        // Range about 12 semitones vertically
        const top = 79, bottom = 60;
        return 1 - Math.max(0, Math.min(1, (midiNote - bottom) / (top - bottom)));
    } else {
        // Bass: top line = A3(57), bottom line = G2(43)
        const top = 57, bottom = 38;
        return 1 - Math.max(0, Math.min(1, (midiNote - bottom) / (top - bottom)));
    }
}

function getMeasureForNote(note) {
    if (!note) return 1;
    return getLogicalSheetMeasureFromTime(note.time) || 1;
}

function getScorePosition(trainingNote, midiNote, trackType) {
    // Which measure is this note in?
    const measureNum = getMeasureForNote(trainingNote);

    // Which page?
    // Approximate: page 1 = measures 1-25, page 2 = 26-50, page 3 = 51+
    // Each page has 5 systems × 4 measures = ~20 measures per page, roughly
    const measuresPerPage = SCORE_LAYOUT.systemsPerPage * SCORE_LAYOUT.measuresPerSystem;
    const page = Math.min(3, Math.ceil(measureNum / measuresPerPage));
    const measureOnPage = ((measureNum - 1) % measuresPerPage);

    const systemIndex = Math.min(
        SCORE_LAYOUT.systemsPerPage - 1,
        Math.floor(measureOnPage / SCORE_LAYOUT.measuresPerSystem)
    );
    const measureInSystem = measureOnPage % SCORE_LAYOUT.measuresPerSystem;

    const systemTop = SCORE_LAYOUT.systemTopFractions[systemIndex];
    const systemH   = SCORE_LAYOUT.systemHeightFraction;

    const isTreble = (trackType === TREBLE);
    const staffYFrac = isTreble ? SCORE_LAYOUT.trebleYFraction : SCORE_LAYOUT.bassYFraction;

    // X position
    const leftFrac  = SCORE_LAYOUT.leftMarginFraction;
    const rightFrac = SCORE_LAYOUT.rightMarginFraction;
    const measureWidth = (rightFrac - leftFrac) / SCORE_LAYOUT.measuresPerSystem;
    const notePitchFrac = midiNote
        ? midiToStaffYFraction(midiNote, isTreble)
        : 0.5;

    const xFrac = leftFrac + measureInSystem * measureWidth + measureWidth * 0.45;
    const yFrac = systemTop + systemH * staffYFrac + systemH * 0.1 * (notePitchFrac - 0.5);

    return { page, xFrac, yFrac };
}

function _applyScoreHighlight(pos) {
    const img = document.getElementById('scoreImg');
    const hl  = document.getElementById('scoreHighlight');
    const imgW = img.clientWidth  || img.naturalWidth  || 900;
    const imgH = img.clientHeight || img.naturalHeight || 600;
    const hlW = 80, hlH = 38;
    hl.style.left   = (pos.xFrac * imgW - hlW / 2) + 'px';
    hl.style.top    = (pos.yFrac * imgH - hlH / 2) + 'px';
    hl.style.width  = hlW + 'px';
    hl.style.height = hlH + 'px';
    hl.classList.add('visible');
}

function highlightScoreNote(noteName, midiNote, trackType, trainingNoteObj) {
    if (!scoreModeActive) return;

    const pos = getScorePosition(trainingNoteObj, midiNote, trackType || TREBLE);

    if (pos.page !== scoreCurrentPage) {
        scoreCurrentPage = pos.page;
        const img = document.getElementById('scoreImg');
        img.onload = () => { img.onload = null; _applyScoreHighlight(pos); };
        renderScorePage(scoreCurrentPage);
        return;
    }

    const img = document.getElementById('scoreImg');
    if (!img.clientWidth) {
        requestAnimationFrame(() => _applyScoreHighlight(pos));
    } else {
        _applyScoreHighlight(pos);
    }
}

function clearScoreHighlight() {
    document.getElementById('scoreHighlight').classList.remove('visible');
}

function showScoreNoteDisplay(noteName, hint) {
    const el = document.getElementById('scoreNoteDisplay');
    document.getElementById('scoreNoteName').textContent = noteName || '—';
    document.getElementById('scoreNoteHint').textContent = hint || '';
    el.classList.add('active');
}

function hideScoreNoteDisplay() {
    document.getElementById('scoreNoteDisplay').classList.remove('active');
}
