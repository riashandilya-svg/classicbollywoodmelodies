<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login • Classic Bollywood Melodies</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,800;1,400;1,600;1,700&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,700&family=DM+Sans:wght@300;400;500;600;700&family=Yatra+One&display=swap" rel="stylesheet">

  <style>
    :root{
      --ivory: #FFF8EE;
      --cream: #FBEFD8;
      --paper: #FFF4E0;
      --marigold: #FFB000;
      --marigold-deep: #E8890B;
      --fuchsia: #E8156B;
      --pink-soft: #FF78A0;
      --teal: #0E8E8A;
      --teal-deep: #075F5C;
      --purple: #6B2BB5;
      --purple-soft: #9B6EFF;
      --gold-1: #D4A24A;
      --gold-2: #F5D67E;
      --gold-3: #B8862C;
      --gold-grad: linear-gradient(135deg, #B8862C 0%, #F5D67E 35%, #D4A24A 65%, #B8862C 100%);
      --maroon: #3A0F2A;
      --maroon-soft: #5C1B40;
      --text: #3A0F2A;
      --muted: rgba(58,15,42,0.62);
      --border-gold: rgba(184,134,44,0.32);
      --border-gold-strong: rgba(184,134,44,0.55);
      --shadow-sm: 0 2px 12px rgba(184,134,44,0.10);
      --shadow: 0 10px 32px rgba(58,15,42,0.12), 0 2px 8px rgba(184,134,44,0.10);
      --shadow-lg: 0 24px 60px rgba(58,15,42,0.18), 0 6px 16px rgba(232,21,107,0.10);
    }

    *{ box-sizing: border-box; }
    html, body{ overflow-x: hidden; }

    body{
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      font-family: 'DM Sans', system-ui, -apple-system, sans-serif;
      background:
        radial-gradient(ellipse 900px 600px at 12% -5%, rgba(255,176,0,0.22), transparent 60%),
        radial-gradient(ellipse 800px 500px at 92% 6%, rgba(232,21,107,0.16), transparent 60%),
        radial-gradient(ellipse 700px 500px at 50% 38%, rgba(107,43,181,0.07), transparent 60%),
        radial-gradient(ellipse 800px 500px at 8% 70%, rgba(14,142,138,0.10), transparent 60%),
        radial-gradient(ellipse 700px 500px at 96% 95%, rgba(255,176,0,0.16), transparent 60%),
        var(--ivory);
      position: relative;
    }

    body::before{
      content: "";
      position: fixed; inset: 0;
      pointer-events: none;
      z-index: 0;
      opacity: 0.35;
      background-image:
        radial-gradient(rgba(184,134,44,0.06) 1px, transparent 1px),
        radial-gradient(rgba(232,21,107,0.04) 1px, transparent 1px);
      background-size: 18px 18px, 24px 24px;
      background-position: 0 0, 9px 9px;
      mix-blend-mode: multiply;
    }

    .petals{ position: fixed; inset: 0; z-index: 1; pointer-events: none; overflow: hidden; }
    .petal{
      position: absolute;
      width: 22px; height: 22px;
      opacity: 0;
      animation: drift linear infinite;
      filter: drop-shadow(0 2px 5px rgba(184,134,44,0.45));
    }
    .petal svg{ width: 100%; height: 100%; display: block; }
    @keyframes drift{
      0%{ transform: translate3d(0,-10vh,0) rotate(0deg); opacity: 0; }
      10%{ opacity: 0.7; }
      90%{ opacity: 0.7; }
      100%{ transform: translate3d(40px,110vh,0) rotate(540deg); opacity: 0; }
    }

    #glitter{ position: fixed; inset: 0; z-index: 2; pointer-events: none; mix-blend-mode: screen; }

    /* ── Navbar ── */
    .banner{
      position: sticky; top: 0; z-index: 100;
      background: linear-gradient(180deg, rgba(255,248,238,0.96), rgba(251,239,216,0.92));
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-bottom: 1px solid var(--border-gold);
      box-shadow: 0 1px 0 rgba(255,255,255,0.7), 0 6px 22px rgba(184,134,44,0.10);
    }
    .banner::before, .banner::after{
      content:""; position:absolute; left:0; right:0; height: 2px;
      background: var(--gold-grad); opacity: 0.85;
    }
    .banner::before{ top: 0; }
    .banner::after{ bottom: -1px; height: 1px; opacity: 0.55; }

    .navGrid{
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      min-height: 68px;
      padding: 8px 16px;
      gap: 12px;
    }

    .navLogo{
      display: flex; align-items: center; text-decoration: none;
      flex-shrink: 0; grid-column: 1; padding-left: 4px;
    }
    .navLogo .logoMedallion{
      width: 50px; height: 50px; border-radius: 999px;
      background: var(--gold-grad); display: grid; place-items: center;
      box-shadow: 0 6px 18px rgba(184,134,44,0.30), inset 0 0 0 2px rgba(255,255,255,0.35);
      position: relative;
    }
    .navLogo .logoMedallion::after{
      content:""; position:absolute; inset: 4px; border-radius: 999px;
      border: 1px dashed rgba(58,15,42,0.35);
    }
    .navLogo .logoMedallion span{
      font-family: 'Playfair Display', serif; font-style: italic;
      font-weight: 800; font-size: 22px; color: var(--maroon);
      text-shadow: 0 1px 0 rgba(255,255,255,0.4);
    }

    .navTitle{ grid-column: 2; justify-self: center; text-align: center; }

    .banner-link{
      font-family: "Playfair Display", serif;
      font-weight: 700; font-style: italic;
      font-size: 26px; letter-spacing: 0.5px;
      text-decoration: none; padding: 4px 10px;
      border-radius: 12px; white-space: nowrap;
      background: linear-gradient(100deg,
        #B8862C 0%, #D4A24A 18%, #F5D67E 38%,
        #FFFFFF 50%, #F5D67E 62%, #D4A24A 82%, #B8862C 100%);
      background-size: 220% 100%;
      -webkit-background-clip: text; background-clip: text;
      color: transparent;
      filter: drop-shadow(0 1px 2px rgba(58,15,42,0.18));
      animation: shimmerGold 7s ease-in-out infinite;
    }
    @keyframes shimmerGold{
      0%,100%{ background-position: 0% 50%; }
      50%{ background-position: 100% 50%; }
    }

    .navBack{ grid-column: 3; justify-self: end; }
    .navBackLink{
      display: inline-flex; align-items: center; gap: 6px;
      font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600;
      color: var(--maroon-soft); text-decoration: none;
      padding: 8px 14px; border-radius: 999px;
      border: 1px solid var(--border-gold);
      background: linear-gradient(180deg, #FFFFFF, #FFF4E0);
      box-shadow: var(--shadow-sm);
      transition: transform 0.14s ease, background 0.14s ease;
    }
    .navBackLink:hover{
      transform: translateY(-1px);
      background: linear-gradient(135deg, rgba(255,176,0,0.14), rgba(232,21,107,0.07));
    }

    /* ── Main ── */
    main{
      position: relative; z-index: 3;
      max-width: 640px; margin: 0 auto;
      padding: 44px 18px 80px; text-align: center;
    }

    .eyebrow{
      display: inline-flex; align-items: center; gap: 10px;
      font-family: 'Cormorant Garamond', serif; font-style: italic;
      font-size: 14px; font-weight: 600; letter-spacing: 0.22em;
      text-transform: uppercase; color: var(--maroon-soft);
      padding: 6px 16px; border-radius: 999px;
      background: linear-gradient(180deg, #FFF, #FFF4E0);
      border: 1px solid var(--border-gold-strong);
      box-shadow: 0 4px 14px rgba(184,134,44,0.16);
      margin-bottom: 18px;
    }
    .eyebrow .star{ color: var(--marigold-deep); font-size: 12px; }

    h1{
      font-family: 'Playfair Display', serif;
      font-weight: 800; font-style: italic;
      font-size: clamp(32px, 5vw, 58px);
      line-height: 1.06; letter-spacing: -0.02em;
      margin: 0 0 10px;
      background: linear-gradient(135deg,
        var(--maroon) 0%, var(--fuchsia) 40%,
        var(--marigold-deep) 70%, var(--maroon) 100%);
      -webkit-background-clip: text; background-clip: text;
      color: transparent;
      filter: drop-shadow(0 2px 8px rgba(232,21,107,0.18));
    }

    .sub{
      margin: 0 auto 28px; max-width: 500px;
      color: var(--muted); font-size: 16px; line-height: 1.6;
    }

    /* ── Card ── */
    .card{
      position: relative; overflow: hidden;
      max-width: 500px; margin: 0 auto;
      text-align: left;
      border-radius: 28px; padding: 32px 28px 28px;
      border: 1px solid var(--border-gold-strong);
      background: linear-gradient(180deg, rgba(255,248,238,0.94), rgba(255,244,224,0.88));
      box-shadow: var(--shadow-lg), inset 0 0 0 1px rgba(255,255,255,0.6);
      backdrop-filter: blur(14px);
    }
    .card::before{
      content:""; position:absolute;
      top: -200px; left: 50%; transform: translateX(-50%);
      width: 600px; height: 600px;
      background: repeating-conic-gradient(from 0deg at 50% 50%,
        rgba(255,176,0,0.07) 0deg 6deg, transparent 6deg 14deg);
      border-radius: 50%; pointer-events:none; z-index: 0;
      animation: spinSun 90s linear infinite;
    }
    @keyframes spinSun{ to{ transform: translateX(-50%) rotate(360deg); } }
    .card::after{
      content:""; position:absolute; inset: 10px;
      border-radius: 20px;
      border: 1px dashed rgba(184,134,44,0.35);
      pointer-events: none; z-index: 0;
    }
    .card > *{ position: relative; z-index: 1; }

    /* ── Social buttons ── */
    .socialRow{ display: flex; gap: 10px; flex-wrap: wrap; }
    .socialBtn{
      flex: 1; min-width: 140px;
      display: inline-flex; align-items: center; justify-content: center; gap: 9px;
      padding: 12px 14px; border-radius: 14px;
      border: 1px solid var(--border-gold-strong);
      background: linear-gradient(180deg, #FFFFFF, #FFF4E0);
      box-shadow: var(--shadow-sm), inset 0 0 0 1px rgba(255,255,255,0.7);
      font-family: 'DM Sans', sans-serif; font-weight: 600; font-size: 14px;
      color: var(--maroon-soft); cursor: pointer;
      transition: transform 0.14s ease, box-shadow 0.14s ease, background 0.14s ease;
    }
    .socialBtn:hover{
      transform: translateY(-2px);
      background: linear-gradient(135deg, rgba(255,176,0,0.14), rgba(232,21,107,0.08));
      box-shadow: var(--shadow), inset 0 0 0 1px rgba(255,255,255,0.7);
    }
    .socialBtn svg{ width: 18px; height: 18px; flex-shrink: 0; }

    /* ── Divider ── */
    .divider{ display: flex; align-items: center; gap: 12px; margin: 22px 0; }
    .divider::before, .divider::after{
      content:""; flex: 1; height: 1px;
      background: var(--gold-grad); opacity: 0.4;
    }
    .divider span{
      font-family: 'Cormorant Garamond', serif; font-style: italic;
      font-size: 13px; color: var(--muted);
      white-space: nowrap; letter-spacing: 0.06em;
    }

    /* ── Label & Input ── */
    label{
      display: block; font-size: 13px; font-weight: 700;
      letter-spacing: 0.06em; text-transform: uppercase;
      margin: 0 0 7px; color: var(--maroon-soft);
      font-family: 'DM Sans', sans-serif;
    }
    input{
      width: 100%; padding: 13px 15px;
      border-radius: 14px; border: 1px solid var(--border-gold-strong);
      outline: none; background: rgba(255,255,255,0.75);
      font-size: 15px; font-family: 'DM Sans', sans-serif; color: var(--text);
      box-shadow: inset 0 2px 6px rgba(184,134,44,0.06);
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }
    input::placeholder{ color: rgba(58,15,42,0.38); }
    input:focus{
      border-color: var(--marigold);
      box-shadow: 0 0 0 4px rgba(255,176,0,0.14), inset 0 2px 6px rgba(184,134,44,0.06);
    }

    .inputGroup{ margin-top: 4px; }

    /* ── Buttons ── */
    .actionRow{ display: flex; gap: 10px; margin-top: 18px; flex-wrap: wrap; }

    .btn{
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      padding: 13px 22px; border-radius: 14px;
      font-family: 'DM Sans', sans-serif; font-weight: 700; font-size: 14px;
      letter-spacing: 0.02em; text-decoration: none; cursor: pointer; border: none;
      transition: transform 0.14s ease, filter 0.14s ease, box-shadow 0.14s ease;
    }
    .btn.primary{
      background: linear-gradient(135deg, var(--marigold) 0%, var(--fuchsia) 100%);
      color: #fff; text-shadow: 0 1px 0 rgba(58,15,42,0.18);
      box-shadow: 0 6px 22px rgba(232,21,107,0.28), inset 0 0 0 1px rgba(255,255,255,0.18);
    }
    .btn.primary:hover{
      transform: translateY(-2px); filter: brightness(1.06);
      box-shadow: 0 10px 30px rgba(232,21,107,0.36), inset 0 0 0 1px rgba(255,255,255,0.20);
    }
    .btn:disabled{ opacity: 0.6; cursor: not-allowed; transform: none !important; }

    /* ── Feedback ── */
    .msg{
      margin-top: 16px; min-height: 22px;
      font-family: 'Cormorant Garamond', serif; font-style: italic;
      font-size: 15px; color: var(--muted); letter-spacing: 0.01em;
    }
    .msg.success{ color: var(--teal-deep); }
    .msg.error{ color: var(--fuchsia); }

    .helper{ margin-top: 14px; font-size: 13px; color: var(--muted); text-align: center; }
  </style>
</head>

<body>
  <div class="petals" id="petals"></div>
  <canvas id="glitter"></canvas>

  <!-- Navbar -->
  <header class="banner">
    <div class="navGrid">
      <a class="navLogo" href="https://www.riaomshandilya.com/">
        <div class="logoMedallion"><span>R</span></div>
      </a>
      <div class="navTitle">
        <a class="banner-link" href="https://www.riaomshandilya.com/">Ria Om Shandilya</a>
      </div>
      <div class="navBack">
        <a class="navBackLink" href="https://riaaz.app/">← Back to App</a>
      </div>
    </div>
  </header>

  <main>
    <div class="eyebrow">
      <span class="star">✦</span>
      Classic Bollywood Melodies
      <span class="star">✦</span>
    </div>

    <h1>Welcome Back</h1>
    <p class="sub">Sign in to your account — continue with Google or Discord, or receive a secure magic link by email.</p>

    <section class="card">

      <!-- Social buttons -->
      <div class="socialRow">
        <button id="google" class="socialBtn" type="button">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          Continue with Google
        </button>
        <button id="discord" class="socialBtn" type="button">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="#5865F2">
            <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057c.002.022.015.043.034.055a19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/>
          </svg>
          Continue with Discord
        </button>
      </div>

      <div class="divider"><span>✦ or sign in with email ✦</span></div>

      <!-- Magic link -->
      <div class="inputGroup">
        <label for="email">Email Address</label>
        <input id="email" type="email" placeholder="you@example.com" autocomplete="email" />
      </div>

      <div class="actionRow">
        <button id="send" class="btn primary" type="button">Send Magic Link ✦</button>
      </div>

      <div id="msg" class="msg"></div>
      <div class="helper">Tip: check Spam / Promotions if you don't see the email.</div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    var SUPABASE_URL = "https://lyqpxcilniqzurevetae.supabase.co";
    var SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx5cXB4Y2lsbmlxenVyZXZldGFlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njk1NDAyMTQsImV4cCI6MjA4NTExNjIxNH0.40ZbAatkMBFHacQGCpiNYpjcKQoZik-Xvqx3bG46x7c";
var REDIRECT_URL = "https://riaaz.app/auth/callback.html";

    var sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    var msgEl = document.getElementById("msg");

    document.getElementById("google").addEventListener("click", function() {
      msgEl.textContent = "Opening Google login…"; msgEl.className = "msg";
      sb.auth.signInWithOAuth({ provider: "google", options: { redirectTo: REDIRECT_URL } })
        .then(function(r) {
          if (r.error) { msgEl.textContent = "Google error: " + r.error.message; msgEl.className = "msg error"; return; }
          if (r.data && r.data.url) window.location.href = r.data.url;
        });
    });

    document.getElementById("discord").addEventListener("click", function() {
      msgEl.textContent = "Opening Discord login…"; msgEl.className = "msg";
      sb.auth.signInWithOAuth({ provider: "discord", options: { redirectTo: REDIRECT_URL } })
        .then(function(r) {
          if (r.error) { msgEl.textContent = "Discord error: " + r.error.message; msgEl.className = "msg error"; return; }
          if (r.data && r.data.url) window.location.href = r.data.url;
        });
    });

    document.getElementById("send").addEventListener("click", function() {
      var email = document.getElementById("email").value.trim();
      if (!email) { msgEl.textContent = "Please enter your email address."; msgEl.className = "msg error"; return; }
      msgEl.textContent = "Sending magic link…"; msgEl.className = "msg";
      sb.auth.signInWithOtp({ email: email, options: { emailRedirectTo: REDIRECT_URL } })
        .then(function(r) {
          if (r.error) { msgEl.textContent = "Error: " + r.error.message; msgEl.className = "msg error"; }
          else { msgEl.textContent = "✦ Link sent! Check your inbox (and Spam / Promotions)."; msgEl.className = "msg success"; }
        });
    });

    // Drifting music notes
    (function(){
      var layer = document.getElementById('petals');
      if (!layer || window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
      var SVGS = [
        '<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><ellipse cx="8" cy="18" rx="5" ry="3.5" fill="#D4A24A" opacity="0.85"/><rect x="12.5" y="3" width="2" height="15" fill="#D4A24A" opacity="0.85"/></svg>',
        '<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><ellipse cx="7" cy="19" rx="4.5" ry="3" fill="#B8862C" opacity="0.85"/><rect x="11" y="4" width="2" height="15" fill="#B8862C" opacity="0.85"/><path d="M13 4 Q22 6 20 13" stroke="#B8862C" stroke-width="2" fill="none" opacity="0.85"/></svg>',
        '<svg viewBox="0 0 28 24" xmlns="http://www.w3.org/2000/svg"><ellipse cx="6" cy="20" rx="4" ry="2.8" fill="#F5D67E" opacity="0.85"/><rect x="9.5" y="6" width="2" height="14" fill="#F5D67E" opacity="0.85"/><ellipse cx="18" cy="17" rx="4" ry="2.8" fill="#F5D67E" opacity="0.85"/><rect x="21.5" y="3" width="2" height="14" fill="#F5D67E" opacity="0.85"/><rect x="9.5" y="6" width="14" height="2.5" fill="#F5D67E" opacity="0.85"/></svg>',
        '<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><ellipse cx="8" cy="18" rx="5" ry="3.5" fill="none" stroke="#D4A24A" stroke-width="2" opacity="0.85"/><rect x="12.5" y="3" width="2" height="15" fill="#D4A24A" opacity="0.85"/></svg>'
      ];
      for (var i = 0; i < 6; i++){
        var p = document.createElement('div');
        p.className = 'petal'; p.innerHTML = SVGS[i % SVGS.length];
        var dur = 18 + Math.random() * 22;
        p.style.left = (i % 2 === 0 ? Math.random() * 10 : 90 + Math.random() * 10) + 'vw';
        p.style.width = p.style.height = (18 + Math.random() * 20) + 'px';
        p.style.animationDuration = dur + 's';
        p.style.animationDelay = (-Math.random() * dur) + 's';
        layer.appendChild(p);
      }
    })();

    // Gold glitter
    (function(){
      if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
      var canvas = document.getElementById('glitter');
      if (!canvas) return;
      var ctx = canvas.getContext('2d', { alpha: true });
      function resize(){
        var dpr = window.devicePixelRatio || 1;
        canvas.width = Math.floor(window.innerWidth * dpr);
        canvas.height = Math.floor(window.innerHeight * dpr);
        canvas.style.width = window.innerWidth + 'px';
        canvas.style.height = window.innerHeight + 'px';
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      }
      window.addEventListener('resize', resize, { passive: true }); resize();
      var particles = [], MAX = 320;
      function addSpark(x, y, intensity){
        intensity = intensity || 1;
        for (var i = 0; i < Math.floor(7 * intensity); i++){
          if (particles.length > MAX) particles.shift();
          var angle = Math.random() * Math.PI * 2, speed = (0.3 + Math.random() * 2) * intensity;
          particles.push({ x:x, y:y, vx:Math.cos(angle)*speed, vy:Math.sin(angle)*speed-0.2,
            life: 34+Math.random()*30, size: 1+Math.random()*2.8, tw: Math.random()*Math.PI*2,
            alpha: 0.52+Math.random()*0.34, hue: Math.random()<0.65?'gold':'white' });
        }
      }
      var last = {x: innerWidth/2, y: innerHeight/2};
      window.addEventListener('pointermove', function(e){
        var d = Math.min(34, Math.hypot(e.clientX-last.x, e.clientY-last.y));
        addSpark(e.clientX, e.clientY, Math.max(0.75, d/16));
        last = {x:e.clientX, y:e.clientY};
      }, {passive:true});
      window.addEventListener('pointerdown', function(e){ addSpark(e.clientX, e.clientY, 1.9); }, {passive:true});
      function tick(){
        ctx.clearRect(0,0,canvas.width,canvas.height);
        for (var i = particles.length-1; i >= 0; i--){
          var p = particles[i]; p.life--;
          if (p.life <= 0){ particles.splice(i,1); continue; }
          p.vx *= 0.986; p.vy *= 0.986; p.vy += 0.018;
          p.x += p.vx; p.y += p.vy; p.tw += 0.22;
          var a = p.alpha * Math.min(1, p.life/44) * (0.62+Math.sin(p.tw)*0.38);
          ctx.beginPath(); ctx.fillStyle = p.hue==='white'?'rgba(255,255,255,'+(a*0.85)+')':'rgba(255,186,0,'+a+')';
          ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
          ctx.beginPath(); ctx.fillStyle = 'rgba(255,220,100,'+(a*0.55)+')';
          ctx.arc(p.x, p.y, p.size*0.55, 0, Math.PI*2); ctx.fill();
          if (Math.random() < 0.24){
            ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.tw*0.35);
            ctx.globalAlpha = a*0.92; ctx.strokeStyle = 'rgba(245,214,126,'+a+')'; ctx.lineWidth = 1;
            ctx.beginPath(); ctx.moveTo(-p.size*2.2,0); ctx.lineTo(p.size*2.2,0);
            ctx.moveTo(0,-p.size*2.2); ctx.lineTo(0,p.size*2.2); ctx.stroke(); ctx.restore();
          }
        }
        requestAnimationFrame(tick);
      }
      tick();
    })();
  </script>
</body>
