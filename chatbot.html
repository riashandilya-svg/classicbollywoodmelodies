<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>riaaz chatbot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    /* ─── Reset & base ─────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      background: transparent;
      overflow: hidden; /* iframe handles its own scroll */
      font-family: 'DM Sans', system-ui, sans-serif;
    }

    :root {
      --violet: 155,110,255;
      --violetDeep: 85,55,190;
      --pink: 255,90,160;
      --text: #160d22;
      --muted: rgba(22,13,34,0.52);
      --bg: rgba(253,248,255,0.97);
      --border: rgba(155,110,255,0.22);
    }

    /* ─── Launcher button ───────────────────────────────────── */
    #riaaz-launcher {
      position: fixed;
      bottom: 24px; right: 24px; z-index: 100;
      width: 72px; height: 72px;
      background: none; border: none; padding: 0;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.3s cubic-bezier(.34,1.56,.64,1);
      filter: drop-shadow(0 8px 20px rgba(155,110,255,0.30))
              drop-shadow(0 2px 6px rgba(0,0,0,0.12));
    }
    #riaaz-launcher:hover {
      transform: scale(1.08) translateY(-3px);
      filter: drop-shadow(0 14px 28px rgba(155,110,255,0.45))
              drop-shadow(0 4px 10px rgba(0,0,0,0.14));
    }

    /* Float animation */
    .bot-wrap { animation: botFloat 3s ease-in-out infinite; }
    @keyframes botFloat {
      0%,100% { transform: translateY(0); }
      50%      { transform: translateY(-4px); }
    }

    /* Eye blink */
    .bot-eye { transform-box: fill-box; transform-origin: center; }
    .bot-eye-l { animation: eyeBlink 4s 0.8s ease-in-out infinite; }
    .bot-eye-r { animation: eyeBlink 4s 1.1s ease-in-out infinite; }
    @keyframes eyeBlink {
      0%,90%,100% { transform: scaleY(1); }
      94%          { transform: scaleY(0.08); }
    }
    #riaaz-launcher:hover .bot-eye-l { animation: quickBlink 0.2s ease-in-out; }
    #riaaz-launcher:hover .bot-eye-r { animation: quickBlink 0.2s 0.06s ease-in-out; }
    @keyframes quickBlink {
      0%,100% { transform: scaleY(1); }
      50%     { transform: scaleY(0.05); }
    }

    /* Ear wiggle */
    .bot-ear-l { transform-box: fill-box; transform-origin: right center; }
    .bot-ear-r { transform-box: fill-box; transform-origin: left center; }
    #riaaz-launcher:hover .bot-ear-l { animation: earL 0.45s ease-in-out; }
    #riaaz-launcher:hover .bot-ear-r { animation: earR 0.45s 0.08s ease-in-out; }
    @keyframes earL { 0%,100%{transform:rotate(0deg);}40%{transform:rotate(-12deg);}70%{transform:rotate(6deg);} }
    @keyframes earR { 0%,100%{transform:rotate(0deg);}40%{transform:rotate(12deg);}70%{transform:rotate(-6deg);} }

    /* Eye glow */
    .eye-glow { animation: eyeGlow 2.5s ease-in-out infinite; }
    @keyframes eyeGlow {
      0%,100% { opacity:.55; }
      50%     { opacity:.9; }
    }

    /* Notification dot */
    .notif-dot { animation: notifPulse 2s ease-in-out infinite; }
    @keyframes notifPulse {
      0%,100% { transform: scale(1); opacity:1; }
      50%     { transform: scale(1.3); opacity:.8; }
    }

    /* Floating music notes */
    .music-note {
      position: absolute;
      font-family: serif;
      pointer-events: none;
      animation: noteFloat linear infinite;
      opacity: 0;
    }
    @keyframes noteFloat {
      0%   { transform: translateY(0) rotate(var(--r)); opacity:0; }
      12%  { opacity:1; }
      85%  { opacity:.8; }
      100% { transform: translateY(-40px) rotate(var(--r)); opacity:0; }
    }

    /* ─── Chat panel ────────────────────────────────────────── */
    #riaaz-chat {
      position: fixed;
      bottom: 108px; right: 24px; z-index: 200;
      width: 385px; max-width: calc(100vw - 40px);
      border-radius: 24px;
      background: var(--bg);
      border: 1px solid var(--border);
      box-shadow: 0 32px 80px rgba(22,10,35,0.18),
                  0 0 0 1px rgba(255,255,255,0.6) inset;
      backdrop-filter: blur(22px) saturate(180%);
      display: flex; flex-direction: column;
      overflow: hidden;
      transform: scale(0.88) translateY(16px);
      opacity: 0; pointer-events: none;
      transition: transform 0.28s cubic-bezier(.34,1.56,.64,1), opacity 0.22s ease;
    }
    #riaaz-chat.rc-open {
      transform: scale(1) translateY(0);
      opacity: 1; pointer-events: all;
    }
    #riaaz-chat::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg,
        rgba(255,90,160,0.8), rgba(155,110,255,0.8), rgba(255,90,160,0.5));
    }

    .rc-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 16px 12px;
      border-bottom: 1px solid rgba(155,110,255,0.12);
      background: rgba(255,255,255,0.5);
      flex-shrink: 0;
    }
    .rc-header-left { display: flex; align-items: center; gap: 9px; }
    .rc-avatar {
      width: 32px; height: 32px; border-radius: 50%;
      background: linear-gradient(135deg,rgba(255,90,160,0.85),rgba(155,110,255,0.85));
      display: flex; align-items: center; justify-content: center;
      font-size: .95rem;
      box-shadow: 0 4px 12px rgba(155,110,255,0.3); flex-shrink: 0;
    }
    .rc-header-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1rem; font-weight: 600; color: var(--text); letter-spacing: -.01em;
    }
    .rc-header-sub { font-size: .67rem; color: rgba(22,13,34,0.42); font-weight: 300; }
    .rc-close {
      width: 28px; height: 28px; border-radius: 50%;
      background: rgba(22,13,34,0.06); border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: .75rem; color: rgba(22,13,34,0.45);
      transition: background .18s; flex-shrink: 0;
    }
    .rc-close:hover { background: rgba(22,13,34,0.1); }

    .rc-msgs {
      overflow-y: auto; padding: 14px 14px 6px;
      display: flex; flex-direction: column; gap: 10px;
      max-height: 320px; min-height: 80px;
      scrollbar-width: thin; scrollbar-color: rgba(155,110,255,0.2) transparent;
    }
    .rc-msgs::-webkit-scrollbar { width: 4px; }
    .rc-msgs::-webkit-scrollbar-thumb { background: rgba(155,110,255,0.2); border-radius: 4px; }

    .rc-bubble {
      max-width: 90%; padding: 10px 13px; border-radius: 16px;
      font-size: .84rem; line-height: 1.65;
      font-family: 'DM Sans', sans-serif; font-weight: 300;
      animation: rcBubblePop .22s cubic-bezier(.34,1.56,.64,1);
    }
    @keyframes rcBubblePop {
      from { transform: scale(.88); opacity:0; }
      to   { transform: scale(1);   opacity:1; }
    }
    .rc-bubble.rc-bot {
      align-self: flex-start;
      background: rgba(255,255,255,0.9);
      border: 1px solid rgba(155,110,255,0.14);
      color: var(--text);
      box-shadow: 0 4px 16px rgba(22,10,35,0.06);
      border-bottom-left-radius: 4px;
    }
    .rc-bubble.rc-user {
      align-self: flex-end;
      background: linear-gradient(135deg,rgba(255,90,160,0.18),rgba(155,110,255,0.14));
      border: 1px solid rgba(155,110,255,0.2);
      color: var(--text);
      border-bottom-right-radius: 4px;
    }

    .rc-typing {
      align-self: flex-start; display: flex; gap: 4px; align-items: center;
      padding: 12px 14px;
      background: rgba(255,255,255,0.9);
      border: 1px solid rgba(155,110,255,0.14);
      border-radius: 16px; border-bottom-left-radius: 4px;
      box-shadow: 0 4px 16px rgba(22,10,35,0.06);
    }
    .rc-typing span {
      width: 6px; height: 6px; border-radius: 50%;
      background: rgba(155,110,255,0.6);
      animation: rcTypingDot 1.2s ease-in-out infinite;
    }
    .rc-typing span:nth-child(2) { animation-delay: .2s; }
    .rc-typing span:nth-child(3) { animation-delay: .4s; }
    @keyframes rcTypingDot {
      0%,60%,100%{ transform:translateY(0); opacity:.4; }
      30%        { transform:translateY(-5px); opacity:1; }
    }

    .rc-chips {
      display: flex; flex-wrap: wrap; gap: 6px;
      padding: 8px 14px 10px; flex-shrink: 0;
    }
    .rc-chip {
      font-size: .72rem; font-weight: 400;
      font-family: 'DM Sans', sans-serif;
      padding: 5px 11px; border-radius: 100px; cursor: pointer;
      border: 1px solid rgba(155,110,255,0.22);
      background: rgba(155,110,255,0.07);
      color: rgba(85,55,190,0.85);
      transition: all .18s; letter-spacing: .01em; white-space: nowrap;
    }
    .rc-chip:hover {
      background: rgba(155,110,255,0.16);
      border-color: rgba(155,110,255,0.4);
      transform: translateY(-1px);
    }

    .rc-input-row {
      display: flex; gap: 8px; align-items: flex-end;
      padding: 10px 12px 13px;
      border-top: 1px solid rgba(155,110,255,0.1);
      background: rgba(255,255,255,0.45);
      flex-shrink: 0;
    }
    #rc-input {
      flex: 1;
      border: 1px solid rgba(155,110,255,0.2); border-radius: 12px;
      padding: 9px 12px; font-size: .83rem;
      font-family: 'DM Sans', sans-serif; font-weight: 300;
      color: var(--text); resize: none; outline: none;
      background: rgba(255,255,255,0.8); line-height: 1.5;
      transition: border-color .18s, box-shadow .18s;
      max-height: 90px; overflow-y: auto;
    }
    #rc-input::placeholder { color: rgba(22,13,34,0.3); }
    #rc-input:focus {
      border-color: rgba(155,110,255,0.4);
      box-shadow: 0 0 0 3px rgba(155,110,255,0.08);
    }
    #rc-send {
      width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0;
      background: linear-gradient(135deg,rgba(255,90,160,0.85),rgba(155,110,255,0.85));
      border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: .88rem; color: white;
      box-shadow: 0 4px 14px rgba(155,110,255,0.35);
      transition: transform .18s cubic-bezier(.34,1.56,.64,1), box-shadow .18s;
    }
    #rc-send:hover { transform: scale(1.1); box-shadow: 0 6px 20px rgba(155,110,255,0.45); }
    #rc-send:disabled { opacity: .45; cursor: not-allowed; transform: none; }
  </style>
</head>
<body>

<!-- ══ LAUNCHER ══ -->
<button id="riaaz-launcher" aria-label="Ask about riaaz" onclick="rcToggle()">

  <!-- Floating music notes -->
  <span class="music-note" style="left:-18px;bottom:52px;font-size:12px;color:rgba(155,110,255,0.7);--r:-15deg;animation-duration:3.2s;animation-delay:0s;">♪</span>
  <span class="music-note" style="right:-16px;bottom:48px;font-size:10px;color:rgba(255,90,160,0.65);--r:12deg;animation-duration:2.8s;animation-delay:1.1s;">♫</span>
  <span class="music-note" style="left:-14px;bottom:30px;font-size:9px;color:rgba(200,130,255,0.6);--r:-8deg;animation-duration:3.6s;animation-delay:0.6s;">♩</span>
  <span class="music-note" style="right:-20px;bottom:28px;font-size:11px;color:rgba(155,110,255,0.55);--r:18deg;animation-duration:4s;animation-delay:1.8s;">♬</span>
  <span class="music-note" style="left:4px;bottom:72px;font-size:8px;color:rgba(255,90,160,0.5);--r:-5deg;animation-duration:3s;animation-delay:2.2s;">♪</span>
  <span class="music-note" style="right:8px;bottom:72px;font-size:9px;color:rgba(155,110,255,0.5);--r:10deg;animation-duration:3.4s;animation-delay:0.4s;">♫</span>

  <div class="bot-wrap">
    <svg width="72" height="80" viewBox="0 0 72 80" fill="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="bodyGrad" cx="38%" cy="28%" r="70%">
          <stop offset="0%"   stop-color="#ffffff"/>
          <stop offset="60%"  stop-color="#ede8f8"/>

        </radialGradient>

        </radialGradient>

        </radialGradient>

      <!-- SHADOW -->
      <ellipse cx="36" cy="78" rx="16" ry="3" fill="rgba(100,70,160,0.12)"/>

      <g class="bot-ear-r">

<div id="riaaz-chat" role="dialog" aria-label="riaaz assistant">
  <div class="rc-header">
    <div class="rc-header-left">
      <div class="rc-avatar">✨</div>
      <div>
        <div class="rc-header-name">Ask about riaaz</div>
        <div class="rc-header-sub">Quick answers · no fluff</div>

  <div class="rc-chips" id="rc-chips">
    <button class="rc-chip" onclick="rcSug(this)">What is riaaz?</button>
    <button class="rc-chip" onclick="rcSug(this)">Is it beginner friendly?</button>

    <button class="rc-chip" onclick="rcSug(this)">Do I need a keyboard?</button>
    <button class="rc-chip" onclick="rcSug(this)">How much does it cost?</button>
    <button class="rc-chip" onclick="rcSug(this)">Who made this?</button>

  </div>

  <div class="rc-input-row">
    <textarea id="rc-input" rows="1" placeholder="Ask anything…" onkeydown="rcKey(event)"></textarea>
    <button id="rc-send" onclick="rcSend()" aria-label="Send">→</button>
  </div>
</div>

<script>
(function () {
  var GROQ_URL = 'https://lyqpxcilniqzurevetae.supabase.co/functions/v1/groq-proxy';

  var SYS = `You are the assistant on the riaaz landing page. Your job is to help visitors understand the app quickly and feel confident trying it. Think of yourself as a friendly person standing at a product demo booth — clear, warm, confident, never salesy.

Keep answers short: 2–4 sentences max unless a short list genuinely helps. Use emojis occasionally but naturally.

When someone asks something not about riaaz, say: "That's a bit outside what I can help with here — but happy to answer anything about riaaz! 🎹"
You can understand and respond in Hindi, Hinglish, or English — match whatever language the user writes in.

WHAT IS RIAAZ
The name: "riaaz" is a play on the Hindi word "riyaaz" (meaning practice) — but spelled with "Ria" at the start, because Ria built it. It's a fun, personal twist on a word every musician knows.
riaaz is an interactive Bollywood piano learning app. Instead of reading sheet music, you follow falling notes that show exactly which keys to press in real time. Plug in a MIDI keyboard, watch the notes fall, play along, and the app instantly tells you if you got it right. Think Synthesia, but built entirely for Bollywood.
Different from YouTube: YouTube is passive. riaaz is interactive — it listens to your keyboard, detects every note, gives real-time right/wrong feedback. You can slow it down, loop sections, practice one hand at a time.

MEASURES
If someone asks about measures or looping sections: riaaz lets you choose a start and end measure so you can loop any section and practise it on repeat — super useful for tricky passages. Watch this to understand measures: https://www.youtube.com/watch?v=FaJh5yr51iw
Complete beginners: Yes, totally fine. Many people start with zero experience. The falling notes guide you visually — no prior knowledge needed.
Sheet music: Not required. The visual system guides you entirely. Sheet music is included as a bonus.
Teacher: Not needed. riaaz is designed for self-learners. Real-time feedback replaces a lot of what a teacher does.
How long: Most beginners play a recognisable Kal Ho Naa Ho or Srivalli within 1–2 weeks of daily practice.
Am I too old: Absolutely not. Many users are in their 30s, 40s and beyond.

EQUIPMENT
Keyboard needed: A MIDI keyboard is recommended but not required. You can try the demo right now with touch or mouse — no equipment needed.
What kind: Any USB MIDI keyboard. Even a 25-key budget one works. 49–61 keys is ideal. No need for 88 keys.
How to connect: Plug into computer via USB. Open in Chrome or Edge. Auto-detects — no drivers needed.

SONGS

Classic: Kal Ho Naa Ho, Gulaabi Aankhen, Ek Ladki Bheegi Bhaagi Si, Hai Apna Dil Toh Awaara, Chookar Mere Mann Ko, Aaoge Jab Tum Sajna

Soulful: Jashn-e-Bahaara, Allah Ke Bande, Ae Hairate Aashiqui, Srivalli
Peppy: Señorita, Naina Da Kya Kasoor, Jaane Kahan Mera Jigar Gaya Ji, Kaisi Paheli Zindagani, Gore Gore Baanke Chorre, Darling, Pal Pal Har Pal, Zoobie Doobie
New songs added every month. Premium users can request songs.
Simplified: Professionally arranged at Grade 2–5 piano level. Melody is faithful — you'll recognise it immediately.

TECHNICAL
Browsers: Chrome and Edge best for MIDI. Safari/Firefox work for touch/mouse.
Mobile: Yes, touch works on phones and tablets. No MIDI on iOS.
Download: Nothing to download. Runs entirely in the browser.
Offline: Needs internet connection.

  var history = [];
  var isOpen  = false;
  var greeted = false;
  var busy    = false;

  window.rcToggle = function () {
    isOpen = !isOpen;
    document.getElementById('riaaz-chat').classList.toggle('rc-open', isOpen);
    if (isOpen && !greeted) {
      greeted = true;
      setTimeout(function () {
        rcAddBot("Namaste! I can help explain how riaaz works or answer any questions before you try it. What would you like to know? 🎹");
      }, 300);
    }
    if (isOpen) setTimeout(function () { document.getElementById('rc-input').focus(); }, 350);
  };

  window.rcSug = function (btn) {
    var chips = document.getElementById('rc-chips');
    if (chips) chips.style.display = 'none';
    rcRun(btn.textContent.trim());
  };

  window.rcKey = function (e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); rcSend(); }
  };

  window.rcSend = function () {
    var inp  = document.getElementById('rc-input');
    var text = inp.value.trim();
    if (!text || busy) return;
    inp.value = ''; inp.style.height = '';
    var chips = document.getElementById('rc-chips');
    if (chips) chips.style.display = 'none';
    rcRun(text);
  };

  async function rcRun(text) {
    if (busy) return;
    busy = true;
    rcAddUser(text);
    history.push({ role: 'user', content: text });
    var typing = rcAddTyping();
    document.getElementById('rc-send').disabled = true;

    try {
      var res  = await fetch(GROQ_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          messages: [{ role: 'system', content: SYS }].concat(history)
        })
      });
      var data = await res.json();
      if (data.error) {
        typing.remove();
        rcAddBot("Error: " + data.error.message);
        busy = false;
        document.getElementById('rc-send').disabled = false;
        return;
      }
      var reply = data.choices?.[0]?.message?.content;
      typing.remove();
      var botText = reply || "Hmm, didn't get a response — try again?";
      rcAddBot(botText);
      history.push({ role: 'assistant', content: botText });
    } catch (err) {
      typing.remove();
      rcAddBot("Network error: " + err.message);
    }

    document.getElementById('rc-send').disabled = false;
    busy = false;
  }

  function rcAddUser(text) {
    var msgs = document.getElementById('rc-msgs');
    var el   = document.createElement('div');
    el.className  = 'rc-bubble rc-user';
    el.textContent = text;
    msgs.appendChild(el);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function rcAddBot(text) {
    var msgs = document.getElementById('rc-msgs');
    var el   = document.createElement('div');
    el.className = 'rc-bubble rc-bot';
    el.innerHTML  = text
      .replace(/\n/g, '<br>')
      .replace(/(https?:\/\/[^\s<]+)/g,
        '<a href="$1" target="_blank" rel="noopener" style="color:rgba(85,55,190,0.9);text-decoration:underline;text-underline-offset:2px;">$1</a>');
    msgs.appendChild(el);
    msgs.scrollTop = msgs.scrollHeight;
    return el;
  }

  function rcAddTyping() {
    var msgs = document.getElementById('rc-msgs');
    var el   = document.createElement('div');
    el.className = 'rc-typing';
    el.innerHTML  = '<span></span><span></span><span></span>';
    msgs.appendChild(el);
    msgs.scrollTop = msgs.scrollHeight;
    return el;
  }

  document.getElementById('rc-input').addEventListener('input', function () {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 90) + 'px';
  });
})();
